<style>
    /* Estilos para Modales */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
    .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #666; }
    
    .btn-action { background: var(--primary); color: white; margin-bottom: 10px; }
    .btn-product { background: var(--accent, #f39c12); color: white; }
    
    .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .product-card { border: 1px solid #eee; padding: 10px; border-radius: 10px; text-align: center; }
    .product-card img { max-width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
</style>

<div class="container">
    <header>
        <div>
            <h1 id="comercio-nombre">Cargando...</h1>
            <span class="status-badge">Tienda Activa ✅</span>
        </div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </header>

    <div class="grid">
        <div class="card">
            <h2>⚙️ Configuración Rápida</h2>
            <button class="btn btn-action" onclick="openModal('modal-tienda')">PERSONALIZAR TIENDA</button>
            <p><small>Logo, Horarios y Ubicación exacta.</small></p>
        </div>
        
        <div class="card">
            <h2>📦 Mis Productos</h2>
            <button class="btn btn-product" onclick="openModal('modal-producto')">+ AGREGAR PRODUCTO</button>
            <div id="lista-productos" class="product-list">
                </div>
        </div>
    </div>
</div>

<div id="modal-tienda" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('modal-tienda')">&times;</span>
        <h2>Personalizar Tienda</h2>
        <div class="form-group">
            <label>URL DEL LOGO</label>
            <input type="text" id="store-logo" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>HORARIO DE ATENCIÓN</label>
            <input type="text" id="store-hours" placeholder="Ej: 08:00 a 20:00">
        </div>
        <div class="form-group">
            <label>¿ATIENDE FUERA DE HORA?</label>
            <select id="store-emergency" style="width:100%; padding:10px; border-radius:8px;">
                <option value="no">No</option>
                <option value="si">Sí (Urgencias)</option>
            </select>
        </div>
        <button class="btn btn-save" onclick="guardarConfigTienda()">GUARDAR TIENDA</button>
    </div>
</div>

<div id="modal-producto" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal('modal-producto')">&times;</span>
        <h2>Nuevo Producto</h2>
        <div class="form-group">
            <label>NOMBRE DEL PRODUCTO</label>
            <input type="text" id="prod-nombre">
        </div>
        <div class="form-group">
            <label>PRECIO ($)</label>
            <input type="number" id="prod-precio">
        </div>
        <div class="form-group">
            <label>URL IMAGEN/FOTO</label>
            <input type="text" id="prod-img" placeholder="https://...">
        </div>
        <button class="btn btn-save" onclick="subirProducto()">SUBIR PRODUCTO</button>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Lógica para abrir/cerrar modales
    window.openModal = (id) => document.getElementById(id).style.display = 'block';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    const usuarioLogueado = localStorage.getItem("sesion");
    let docIdActual = null;

    // Cargar datos iniciales y productos
    const inicializarPanel = async () => {
        const q = query(collection(db, "comercios"), where("usuario", "==", usuarioLogueado));
        const snap = await getDocs(q);
        snap.forEach(d => {
            docIdActual = d.id;
            document.getElementById('comercio-nombre').innerText = d.data().nombre;
            // Cargar datos existentes en el modal de tienda si existen
            document.getElementById('store-logo').value = d.data().logo || '';
            document.getElementById('store-hours').value = d.data().horario || '';
        });
        cargarProductos();
    };

    window.guardarConfigTienda = async () => {
        const ref = doc(db, "comercios", docIdActual);
        await updateDoc(ref, {
            logo: document.getElementById('store-logo').value,
            horario: document.getElementById('store-hours').value,
            atiendeEmergencia: document.getElementById('store-emergency').value
        });
        alert("Configuración de tienda actualizada");
        closeModal('modal-tienda');
    };

    window.subirProducto = async () => {
        await addDoc(collection(db, "productos"), {
            comercioUsuario: usuarioLogueado,
            nombre: document.getElementById('prod-nombre').value,
            precio: document.getElementById('prod-precio').value,
            imagen: document.getElementById('prod-img').value
        });
        alert("Producto agregado");
        closeModal('modal-producto');
        cargarProductos();
    };

    const cargarProductos = async () => {
        const q = query(collection(db, "productos"), where("comercioUsuario", "==", usuarioLogueado));
        const snap = await getDocs(q);
        const lista = document.getElementById('lista-productos');
        lista.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            lista.innerHTML += `
                <div class="product-card">
                    <img src="${p.imagen || 'https://via.placeholder.com/100'}" alt="prod">
                    <h4>${p.nombre}</h4>
                    <p><strong>$${p.precio}</strong></p>
                </div>`;
        });
    };

    inicializarPanel();
</script>
