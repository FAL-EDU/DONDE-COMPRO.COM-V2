<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Panel - Comerciante</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .p-card { background: white; padding: 15px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bienvenido, <span id="shop-name">...</span></h1>
        <button onclick="window.cerrarSesion()" style="background:#e74c3c; color:white; border:none; padding:10px">Salir</button>
    </div>

    <div class="card" style="margin-top:20px">
        <h3>Añadir Producto</h3>
        <input type="text" id="p-nombre" placeholder="Nombre Producto">
        <input type="number" id="p-precio" placeholder="Precio">
        <button onclick="window.addProd()" style="background:#27ae60; color:white; padding:10px">Publicar</button>
    </div>

    <div id="mis-productos" class="product-grid"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const id = localStorage.getItem("comercioId");
        document.getElementById('shop-name').innerText = localStorage.getItem("comercioNombre");

        window.addProd = async () => {
            await addDoc(collection(db, "productos"), {
                nombre: document.getElementById('p-nombre').value,
                precio: document.getElementById('p-precio').value,
                comercioId: id
            });
            location.reload();
        };

        const cargarProds = async () => {
            const q = query(collection(db, "productos"), where("comercioId", "==", id));
            const snap = await getDocs(q);
            const container = document.getElementById('mis-productos');
            snap.forEach(d => {
                container.innerHTML += `<div class="p-card"><h4>${d.data().nombre}</h4><p>$${d.data().precio}</p>
                    <button onclick="window.eliminar('${d.id}')" style="color:red">Eliminar</button></div>`;
            });
        };

        window.eliminar = async (pid) => { if(confirm("¿Borrar?")){ await deleteDoc(doc(db, "productos", pid)); location.reload(); } };
        window.cerrarSesion = () => { localStorage.clear(); window.location.href = "login.html"; };
        
        cargarProds();
    </script>
</body>
</html>
