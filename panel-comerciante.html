<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Comerciante - DÓNDE COMPRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-update { background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-logout { background: #7f8c8d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        <h2 id="saludo-comercio">Panel de Comerciante</h2>
        <div class="form-group"><label>Nombre:</label><input type="text" id="edit-nombre"></div>
        <div class="form-group"><label>Dirección:</label><input type="text" id="edit-direccion"></div>
        <div class="form-group"><label>WhatsApp:</label><input type="text" id="edit-whatsapp"></div>
        <button class="btn-update" id="btnActualizar">GUARDAR CAMBIOS</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const usuarioLogueado = localStorage.getItem("sesion");
        const tipoUsuario = localStorage.getItem("tipo");
        let docIdActual = null;

        if (!usuarioLogueado || tipoUsuario !== "comercio") {
            window.location.href = 'login.html';
        }

        const cargarDatos = async () => {
            const q = query(collection(db, "comercios"), where("usuario", "==", usuarioLogueado));
            const snap = await getDocs(q);
            snap.forEach((docSnap) => {
                docIdActual = docSnap.id;
                const data = docSnap.data();
                document.getElementById('saludo-comercio').innerText = "Panel de: " + data.nombre;
                document.getElementById('edit-nombre').value = data.nombre || '';
                document.getElementById('edit-direccion').value = data.direccion || '';
                document.getElementById('edit-whatsapp').value = data.whatsapp || '';
            });
        };

        document.getElementById('btnActualizar').onclick = async () => {
            if (!docIdActual) return;
            const ref = doc(db, "comercios", docIdActual);
            await updateDoc(ref, {
                nombre: document.getElementById('edit-nombre').value,
                direccion: document.getElementById('edit-direccion').value,
                whatsapp: document.getElementById('edit-whatsapp').value
            });
            alert("¡Información actualizada!");
        };

        window.cerrarSesion = () => { localStorage.clear(); window.location.href = 'login.html'; };
        cargarDatos();
    </script>
</body>
</html>
