<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión - DÓNDE COMPRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        header { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-left: 8px solid var(--secondary); }
        h1 { color: var(--primary); margin: 0; font-size: 1.4rem; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1rem; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-save:hover { background: #219150; }
        .btn-logout { background: #7f8c8d; color: white; width: auto; padding: 8px 15px; font-size: 0.8rem; }

        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; background: #e8f5e9; color: #2e7d32; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1 id="comercio-nombre">Cargando comercio...</h1>
                <span class="status-badge">Cuenta Verificada ✅</span>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </header>

        <div class="grid">
            <div class="card">
                <h2>📍 Información de Ubicación</h2>
                <div class="form-group">
                    <label>NOMBRE DEL COMERCIO</label>
                    <input type="text" id="edit-nombre">
                </div>
                <div class="form-group">
                    <label>DIRECCIÓN FÍSICA</label>
                    <input type="text" id="edit-direccion">
                </div>
                <button class="btn btn-save" id="btn-save-info">ACTUALIZAR UBICACIÓN</button>
            </div>

            <div class="card">
                <h2>📱 Contacto y Clientes</h2>
                <div class="form-group">
                    <label>WHATSAPP (Solo números)</label>
                    <input type="text" id="edit-whatsapp" placeholder="Ej: 3456788789">
                </div>
                <div class="form-group">
                    <label>LINK DE CATÁLOGO / WEB (Opcional)</label>
                    <input type="text" id="edit-web" placeholder="https://...">
                </div>
                <button class="btn btn-save" id="btn-save-contact">GUARDAR CONTACTO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. SEGURIDAD: Sincronizado con login.html
        const usuarioLogueado = localStorage.getItem("sesion");
        const tipoUsuario = localStorage.getItem("tipo");
        let docIdActual = null;

        if (!usuarioLogueado || tipoUsuario !== "comercio") {
            window.location.href = 'login.html';
        }

        // 2. CARGAR DATOS
        const cargarPanel = async () => {
            const q = query(collection(db, "comercios"), where("usuario", "==", usuarioLogueado));
            const snap = await getDocs(q);
            
            snap.forEach((docSnap) => {
                docIdActual = docSnap.id;
                const data = docSnap.data();
                document.getElementById('comercio-nombre').innerText = data.nombre;
                document.getElementById('edit-nombre').value = data.nombre || '';
                document.getElementById('edit-direccion').value = data.direccion || '';
                document.getElementById('edit-whatsapp').value = data.whatsapp || '';
                document.getElementById('edit-web').value = data.web || '';
            });
        };

        // 3. FUNCIONES DE ACTUALIZACIÓN
        const actualizarDatos = async () => {
            if (!docIdActual) return;
            try {
                const ref = doc(db, "comercios", docIdActual);
                await updateDoc(ref, {
                    nombre: document.getElementById('edit-nombre').value,
                    direccion: document.getElementById('edit-direccion').value,
                    whatsapp: document.getElementById('edit-whatsapp').value,
                    web: document.getElementById('edit-web').value
                });
                alert("¡Datos actualizados correctamente!");
                location.reload(); // Recarga para ver los cambios
            } catch (e) {
                alert("Error al actualizar.");
            }
        };

        document.getElementById('btn-save-info').onclick = actualizarDatos;
        document.getElementById('btn-save-contact').onclick = actualizarDatos;

        window.cerrarSesion = () => {
            localStorage.clear();
            window.location.href = 'login.html';
        };

        cargarPanel();
    </script>
</body>
</html>
