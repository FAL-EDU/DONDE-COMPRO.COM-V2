<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Localización de productos cercanos</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: #333; }
        
        /* Header y Hero */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
            background-size: cover; 
            background-position: center;
        }
        .logo-img { max-width: 120px; margin-bottom: 10px; }
        
        /* Buscador */
        .search-container {
            max-width: 800px;
            margin: -35px auto 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
        }
        .search-container input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-buscar { background: var(--secondary); color: white; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Botón Registro */
        .btn-registro-trigger {
            display: block;
            max-width: 400px;
            margin: 40px auto;
            background: var(--accent);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            transition: 0.3s;
        }
        .btn-registro-trigger:hover { transform: scale(1.05); }

        /* MODAL ESTILIZADO */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #999; }
        
        .modal-content h2 { margin-top: 0; color: var(--primary); }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        
        .credenciales-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid #eee;
        }
        .credenciales-box label { font-size: 0.75rem; color: var(--secondary); font-weight: bold; }
        
        .btn-enviar {
            width: 100%;
            padding: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="" id="main-logo" class="logo-img" alt="Logo" style="display:none;">
        <h1 id="site-title">DÓNDE COMPRO</h1>
        <p>Localización de productos cercanos</p>
    </header>

    <div class="search-container">
        <input type="text" id="input-busqueda" placeholder="¿Qué estás buscando? (ej: Paracetamol, Coca Cola...)">
        <button class="btn-buscar" id="btn-buscar">BUSCAR</button>
    </div>

    <a href="#" class="btn-registro-trigger" onclick="abrirModal()">📢 REGISTRA TU COMERCIO AQUÍ</a>

    <div id="resultados-busqueda" style="max-width: 800px; margin: 20px auto; padding: 20px;"></div>

    <div id="modal-registro" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h2>Solicitud de Admisión</h2>
            <p style="color: #666; font-size: 0.9rem;">Crea tu espacio y empieza a gestionar tu tienda.</p>
            
            <input type="text" id="reg-nombre" placeholder="Nombre de la Tienda">
            
            <select id="reg-rubro">
                <option value="">Selecciona tu Rubro...</option>
                </select>

            <input type="text" id="reg-direccion" placeholder="Dirección del Local">
            
            <input type="text" id="reg-whatsapp" placeholder="Teléfono / WhatsApp (ej: 3876...)">

            <div class="credenciales-box">
                <label>DATOS DE ACCESO AL PANEL:</label>
                <input type="text" id="reg-usuario" placeholder="Elige un nombre de Usuario">
                <input type="password" id="reg-pass" placeholder="Crea una Contraseña">
            </div>

            <button class="btn-enviar" id="btn-enviar-solicitud">ENVIAR SOLICITUD</button>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. CARGAR CONFIGURACIÓN VISUAL (Logo y Fondo)
        async function cargarApariencia() {
            const snap = await getDoc(doc(db, "configuracion", "apariencia"));
            if(snap.exists()) {
                const data = snap.data();
                if(data.logoUrl) { 
                    const img = document.getElementById('main-logo');
                    img.src = data.logoUrl;
                    img.style.display = 'inline-block';
                }
                if(data.fondoUrl) {
                    document.getElementById('main-header').style.backgroundImage = `linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), url('${data.fondoUrl}')`;
                }
            }
        }
        cargarApariencia();

        // 2. CARGAR RUBROS EN EL MODAL
        onSnapshot(collection(db, "rubros"), (snap) => {
            const select = document.getElementById('reg-rubro');
            select.innerHTML = '<option value="">Selecciona tu Rubro...</option>';
            snap.forEach(d => {
                select.innerHTML += `<option value="${d.data().nombre}">${d.data().nombre}</option>`;
            });
        });

        // 3. LÓGICA DE ENVÍO DE SOLICITUD (Con Usuario)
        document.getElementById('btn-enviar-solicitud').onclick = async () => {
            const nombre = document.getElementById('reg-nombre').value;
            const rubro = document.getElementById('reg-rubro').value;
            const direccion = document.getElementById('reg-direccion').value;
            const whatsapp = document.getElementById('reg-whatsapp').value;
            const usuario_elegido = document.getElementById('reg-usuario').value;
            const pass = document.getElementById('reg-pass').value;

            if(!nombre || !rubro || !usuario_elegido || !pass) {
                alert("Completa los campos obligatorios y elige un usuario.");
                return;
            }

            try {
                await addDoc(collection(db, "solicitudes"), {
                    nombre, rubro, direccion, whatsapp,
                    usuario_elegido, // Este es el campo que faltaba
                    pass,
                    estado: "pendiente",
                    fecha: new Date().toISOString()
                });
                alert("¡Solicitud enviada con éxito!");
                cerrarModal();
            } catch (e) {
                alert("Error al enviar la solicitud.");
            }
        };

        // FUNCIONES GLOBALES
        window.abrirModal = () => document.getElementById('modal-registro').style.display = 'flex';
        window.cerrarModal = () => document.getElementById('modal-registro').style.display = 'none';
    </script>
</body>
</html>
