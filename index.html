<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DÓNDE COMPRO - Inicio</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); }
        .hero { 
            height: 400px; background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .nav-top { position: absolute; top: 20px; right: 20px; }
        .btn-access { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; border: 1px solid white; }
    </style>
</head>
<body>
    <div class="nav-top">
        <a href="login.html" class="btn-access">Acceso Comerciantes</a>
    </div>

    <header id="main-header" class="hero">
        <img id="main-logo" src="" alt="Logo" style="max-width: 150px; margin-bottom: 20px;">
        <h1>¿Qué estás buscando hoy?</h1>
        <div class="search-box">
            <input type="text" id="busqueda" placeholder="Ej: Pan, Leche, Baterías...">
            <button onclick="buscar()">Buscar</button>
        </div>
    </header>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function cargarApariencia() {
            const snap = await getDoc(doc(db, "configuracion", "apariencia"));
            if(snap.exists()){
                const cfg = snap.data();
                if(cfg.logo) document.getElementById('main-logo').src = cfg.logo;
                if(cfg.fondo_inicio) document.getElementById('main-header').style.backgroundImage = `url('${cfg.fondo_inicio}')`;
            }
        }
        cargarApariencia();
    </script>
</body>
</html>
