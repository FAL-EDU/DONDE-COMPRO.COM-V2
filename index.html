<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Localización de productos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        header { background: #2c3e50; color: white; padding: 40px 20px; text-align: center; position: relative; }
        .logo-container img { max-width: 150px; margin-bottom: 10px; }
        
        /* Buscador */
        .search-container { 
            background: white; padding: 20px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 600px;
            margin: -30px auto 30px; display: flex; gap: 10px;
        }
        .search-container input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        .search-container button { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Botón Registro Flotante */
        .btn-registro-main {
            display: block; width: fit-content; margin: 40px auto;
            background: #f39c12; color: white; padding: 15px 30px;
            border: none; border-radius: 50px; font-weight: bold;
            cursor: pointer; text-decoration: none; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            transition: 0.3s;
        }
        .btn-registro-main:hover { transform: scale(1.05); background: #e67e22; }

        /* Modal Solicitud */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; }
        .modal input, .modal textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
    </style>
</head>
<body>

    <header id="cabecera">
        <div class="logo-container">
            <img id="logo-img" src="https://via.placeholder.com/150?text=LOGO" alt="Logo">
        </div>
        <h2 id="titulo-web">Localización de productos cercanos</h2>
    </header>

    <div class="search-container">
        <input type="text" id="inputBusqueda" placeholder="¿Qué buscas? (ej: Pan, Leche, Farmacia)">
        <button id="btnBuscar">BUSCAR</button>
    </div>

    <button class="btn-registro-main" onclick="document.getElementById('modalSol').style.display='flex'">
        📢 ¿TIENES UN COMERCIO? REGÍSTRATE AQUÍ
    </button>

    <div id="resultados" style="padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
        </div>

    <div id="modalSol" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('modalSol').style.display='none'">&times;</span>
            <h3 style="margin-top:0;">Solicitud de Admisión</h3>
            <p style="font-size: 0.85rem; color: #666;">Envía tus datos y nos pondremos en contacto contigo.</p>
            
            <input type="text" id="sol-nombre" placeholder="Nombre de tu Comercio">
            <input type="text" id="sol-whatsapp" placeholder="Tu WhatsApp (ej: 549387...)">
            <textarea id="sol-mensaje" placeholder="Cuéntanos qué vendes..." style="height: 80px;"></textarea>
            
            <button id="btnEnviarSol" style="width:100%; background:#27ae60; color:white; border:none; padding:12px; border-radius:4px; font-weight:bold; cursor:pointer;">
                ENVIAR SOLICITUD
            </button>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, doc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Cargar Estética (Logo y Fondo)
        async function cargarEstetica() {
            const docSnap = await getDoc(doc(db, "configuracion", "apariencia"));
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.logoUrl) document.getElementById('logo-img').src = data.logoUrl;
                if(data.fondoUrl) document.getElementById('cabecera').style.backgroundImage = `url('${data.fondoUrl}')`;
            }
        }
        cargarEstetica();

        // 2. Enviar Solicitud
        document.getElementById('btnEnviarSol').onclick = async () => {
            const nombre = document.getElementById('sol-nombre').value;
            const whatsapp = document.getElementById('sol-whatsapp').value;
            const mensaje = document.getElementById('sol-mensaje').value;

            if(!nombre || !whatsapp) return alert("Completa nombre y WhatsApp");

            try {
                await addDoc(collection(db, "solicitudes"), {
                    nombre, whatsapp, mensaje,
                    fecha: new Date().toLocaleString(),
                    estado: "pendiente"
                });
                alert("¡Solicitud enviada! Te contactaremos pronto.");
                document.getElementById('modalSol').style.display = 'none';
            } catch (e) { alert("Error al enviar."); }
        };

        // 3. Mecánica de Búsqueda (Básica)
        document.getElementById('btnBuscar').onclick = async () => {
            const busqueda = document.getElementById('inputBusqueda').value.toLowerCase();
            const resultadosDiv = document.getElementById('resultados');
            resultadosDiv.innerHTML = "Buscando...";

            const q = query(collection(db, "comercios"));
            const querySnapshot = await getDocs(q);
            
            resultadosDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const c = doc.data();
                if(c.nombre.toLowerCase().includes(busqueda) || c.rubro.toLowerCase().includes(busqueda)) {
                    resultadosDiv.innerHTML += `
                        <div style="background:white; padding:15px; border-radius:8px; shadow: 0 2px 5px rgba(0,0,0,0.1)">
                            <h4 style="margin:0; color:#27ae60;">${c.nombre}</h4>
                            <p style="font-size:0.8rem; margin:5px 0;">📍 ${c.direccion}</p>
                            <a href="https://wa.me/${c.whatsapp}" target="_blank" style="color:#2ecc71; text-decoration:none; font-weight:bold;">WhatsApp 📱</a>
                        </div>
                    `;
                }
            });
        };
    </script>
</body>
</html>
