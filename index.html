<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Localización de productos cercanos</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: #333; }
        
        /* BOTÓN RECUPERADO: ACCESO USUARIOS (Admin y Comerciantes) */
        .admin-access {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        .btn-usuarios {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-usuarios:hover { background: white; color: var(--primary); }

        /* Header con soporte para Logo y Fondo dinámico */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            background-size: cover; 
            background-position: center;
            position: relative;
        }
        .logo-img { max-width: 110px; margin-bottom: 10px; border-radius: 12px; }
        
        /* Buscador Flotante */
        .search-container {
            max-width: 750px;
            margin: -35px auto 20px;
            background: white;
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            gap: 10px;
        }
        .search-container input { flex: 1; padding: 16px; border: 1px solid #eee; border-radius: 10px; outline: none; font-size: 1rem; }
        .btn-buscar { background: var(--secondary); color: white; border: none; padding: 0 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* MODAL RESPONSIVO (No se sale de la pantalla) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            position: relative;
            max-height: 95vh; /* Evita que se oculte el final */
            overflow-y: auto; /* Permite scroll interno */
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .close { position: sticky; top: 0; float: right; font-size: 30px; cursor: pointer; color: #bbb; margin-top: -15px; }
        
        .modal-content h2 { margin: 0 0 5px; color: var(--primary); }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 13px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }
        
        /* Bloque de Credenciales para que impacte el "Usuario" */
        .credenciales-box {
            background: #f1f8f4;
            padding: 15px;
            border-radius: 12px;
            margin: 12px 0;
            border: 1px solid var(--secondary);
        }
        .credenciales-box label { font-size: 0.75rem; color: var(--secondary); font-weight: bold; display: block; margin-bottom: 5px; }
        
        .btn-enviar {
            width: 100%;
            padding: 16px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-registro-trigger {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
            margin: 40px 0;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="admin-access">
            <a href="admin-panel.html" class="btn-usuarios">👤 ACCESO USUARIOS</a>
        </div>

        <img src="" id="main-logo" class="logo-img" alt="Logo" style="display:none;">
        <h1 id="site-title">DÓNDE COMPRO</h1>
        <p>Localización de productos cercanos</p>
    </header>

    <div class="search-container">
        <input type="text" id="input-busqueda" placeholder="¿Qué buscas hoy?">
        <button class="btn-buscar">BUSCAR</button>
    </div>

    <div style="text-align: center;">
        <a href="javascript:void(0)" class="btn-registro-trigger" onclick="abrirModal()">
            📢 REGISTRA TU COMERCIO AQUÍ
        </a>
    </div>

    <div id="modal-registro" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h2>Solicitud de Admisión</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Crea tu espacio en nuestra red.</p>
            
            <input type="text" id="reg-nombre" placeholder="Nombre del Comercio">
            
            <select id="reg-rubro">
                <option value="">Selecciona tu Rubro...</option>
                </select>

            <input type="text" id="reg-direccion" placeholder="Dirección del Local">
            
            <input type="text" id="reg-whatsapp" placeholder="WhatsApp (ej: 3876...)">

            <div class="credenciales-box">
                <label>🔐 DATOS DE ACCESO:</label>
                <input type="text" id="reg-usuario" placeholder="Elige tu nombre de Usuario">
                <input type="password" id="reg-pass" placeholder="Crea tu Contraseña">
            </div>

            <button class="btn-enviar" id="btn-enviar-solicitud">ENVIAR SOLICITUD</button>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Cargar Logo y Fondo del Admin
        async function loadUI() {
            const config = await getDoc(doc(db, "configuracion", "apariencia"));
            if(config.exists()) {
                const { logoUrl, fondoUrl } = config.data();
                if(logoUrl) { 
                    const img = document.getElementById('main-logo');
                    img.src = logoUrl; img.style.display = 'inline-block';
                }
                if(fondoUrl) {
                    document.getElementById('main-header').style.backgroundImage = 
                        `linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), url('${fondoUrl}')`;
                }
            }
        }
        loadUI();

        // Cargar Rubros
        onSnapshot(collection(db, "rubros"), (snap) => {
            const select = document.getElementById('reg-rubro');
            select.innerHTML = '<option value="">Selecciona tu Rubro...</option>';
            snap.forEach(d => {
                select.innerHTML += `<option value="${d.data().nombre}">${d.data().nombre}</option>`;
            });
        });

        // Envío de Solicitud (Capturando el Usuario)
        document.getElementById('btn-enviar-solicitud').onclick = async () => {
            const nombre = document.getElementById('reg-nombre').value;
            const rubro = document.getElementById('reg-rubro').value;
            const usuario_elegido = document.getElementById('reg-usuario').value;
            const pass = document.getElementById('reg-pass').value;

            if(!nombre || !usuario_elegido || !pass) {
                alert("Completa los campos obligatorios para el registro.");
                return;
            }

            try {
                await addDoc(collection(db, "solicitudes"), {
                    nombre, rubro, 
                    direccion: document.getElementById('reg-direccion').value,
                    whatsapp: document.getElementById('reg-whatsapp').value,
                    usuario_elegido, // Dato que llega al admin
                    pass,
                    fecha: new Date().toLocaleString()
                });
                alert("¡Solicitud enviada con éxito!");
                cerrarModal();
            } catch (e) {
                alert("Error al procesar. Revisa tu conexión.");
            }
        };

        window.abrirModal = () => document.getElementById('modal-registro').style.display = 'flex';
        window.cerrarModal = () => document.getElementById('modal-registro').style.display = 'none';
    </script>
</body>
</html>
