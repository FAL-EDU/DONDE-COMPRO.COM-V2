<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Localización de productos cercanos</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: #333; }
        
        /* Header con soporte para personalización */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            background-size: cover; 
            background-position: center;
            transition: 0.5s;
        }
        .logo-img { max-width: 150px; margin-bottom: 15px; border-radius: 10px; }
        
        /* Buscador Estilizado */
        .search-container {
            max-width: 800px;
            margin: -40px auto 20px;
            background: white;
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
        }
        .search-container input { flex: 1; padding: 18px; border: 1px solid #eee; border-radius: 10px; font-size: 1rem; outline: none; }
        .btn-buscar { background: var(--secondary); color: white; border: none; padding: 0 35px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* Botón de Registro Central */
        .btn-registro-trigger {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.3);
            margin-top: 50px;
            transition: 0.3s;
        }
        .btn-registro-trigger:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(243, 156, 18, 0.5); }

        /* MODAL DE SOLICITUD */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 95%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .close { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #bbb; }
        
        .modal-content h2 { margin: 0 0 10px; color: var(--primary); font-size: 1.8rem; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        
        /* Bloque de Usuarios (Lo que faltaba) */
        .credenciales-box {
            background: #f1f8f4;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            border: 2px dashed var(--secondary);
        }
        .credenciales-box label { 
            font-size: 0.75rem; 
            color: var(--secondary); 
            font-weight: 800; 
            display: block; 
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .btn-enviar {
            width: 100%;
            padding: 16px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div id="header-content">
            <img src="" id="main-logo" class="logo-img" alt="Logo" style="display:none;">
            <h1 id="site-title" style="margin:0; font-size: 2.5rem;">DÓNDE COMPRO</h1>
            <p style="opacity: 0.9;">Localización de productos cercanos</p>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="input-busqueda" placeholder="¿Qué buscas hoy? (ej: Farmacia, Pizza, Supermercado...)">
        <button class="btn-buscar">BUSCAR</button>
    </div>

    <div style="text-align: center;">
        <a href="javascript:void(0)" class="btn-registro-trigger" onclick="abrirModal()">
            📢 REGISTRA TU COMERCIO AQUÍ
        </a>
    </div>

    <div id="modal-registro" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h2>Solicitud de Admisión</h2>
            <p style="color: #666; font-size: 0.95rem; margin-bottom: 20px;">Únete a nuestra red de comercios locales.</p>
            
            <input type="text" id="reg-nombre" placeholder="Nombre de tu Comercio">
            
            <select id="reg-rubro">
                <option value="">Selecciona tu Rubro...</option>
                </select>

            <input type="text" id="reg-direccion" placeholder="Dirección Exacta">
            
            <input type="text" id="reg-whatsapp" placeholder="WhatsApp (ej: 3876543210)">

            <div class="credenciales-box">
                <label>🔐 Datos para entrar a tu Panel:</label>
                <input type="text" id="reg-usuario" placeholder="Crea un nombre de Usuario" style="border-color: var(--secondary);">
                <input type="password" id="reg-pass" placeholder="Crea tu Contraseña de acceso">
            </div>

            <button class="btn-enviar" id="btn-enviar-solicitud">ENVIAR MI SOLICITUD</button>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Carga de estética desde el panel admin
        async function aplicarEstetica() {
            const config = await getDoc(doc(db, "configuracion", "apariencia"));
            if(config.exists()) {
                const { logoUrl, fondoUrl } = config.data();
                if(logoUrl) { 
                    const logo = document.getElementById('main-logo');
                    logo.src = logoUrl;
                    logo.style.display = 'inline-block';
                }
                if(fondoUrl) {
                    document.getElementById('main-header').style.backgroundImage = 
                        `linear-gradient(rgba(44, 62, 80, 0.85), rgba(44, 62, 80, 0.85)), url('${fondoUrl}')`;
                }
            }
        }
        aplicarEstetica();

        // Carga dinámica de rubros
        onSnapshot(collection(db, "rubros"), (snap) => {
            const select = document.getElementById('reg-rubro');
            select.innerHTML = '<option value="">Selecciona tu Rubro...</option>';
            snap.forEach(d => {
                select.innerHTML += `<option value="${d.data().nombre}">${d.data().nombre}</option>`;
            });
        });

        // Envío de solicitud con el campo de usuario incluido
        document.getElementById('btn-enviar-solicitud').onclick = async () => {
            const nombre = document.getElementById('reg-nombre').value;
            const rubro = document.getElementById('reg-rubro').value;
            const direccion = document.getElementById('reg-direccion').value;
            const whatsapp = document.getElementById('reg-whatsapp').value;
            const usuario_elegido = document.getElementById('reg-usuario').value; // CAMPO CLAVE
            const pass = document.getElementById('reg-pass').value;

            if(!nombre || !rubro || !usuario_elegido || !pass) {
                alert("Por favor completa los datos de acceso (Usuario y Contraseña).");
                return;
            }

            try {
                await addDoc(collection(db, "solicitudes"), {
                    nombre, rubro, direccion, whatsapp,
                    usuario_elegido, // Se envía a Firebase
                    pass,
                    fecha: new Date().toLocaleString()
                });
                alert("¡Excelente! Tu solicitud con el usuario '" + usuario_elegido + "' ha sido enviada.");
                cerrarModal();
            } catch (e) {
                alert("Error de conexión. Intenta de nuevo.");
            }
        };

        window.abrirModal = () => document.getElementById('modal-registro').style.display = 'flex';
        window.cerrarModal = () => document.getElementById('modal-registro').style.display = 'none';
    </script>
</body>
</html>
