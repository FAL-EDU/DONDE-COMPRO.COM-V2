<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Comercio - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--primary); margin-top: 0; text-align: center; }
        p { color: #666; text-align: center; font-size: 0.9rem; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-enviar { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-enviar:hover { background: #219150; transform: translateY(-2px); }
        .footer-links { text-align: center; margin-top: 20px; }
        .footer-links a { color: var(--primary); text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Únete a Dónde Compro</h2>
    <p>Completa tus datos para que los vecinos te encuentren. Tu solicitud será revisada por un administrador.</p>
    
    <form id="form-registro">
        <label>Nombre del Comercio</label>
        <input type="text" id="nombre" placeholder="Ej: Panadería El Sol" required>

        <label>Email (Este será tu Usuario)</label>
        <input type="email" id="usuario" placeholder="correo@ejemplo.com" required>

        <label>Contraseña de Acceso</label>
        <input type="password" id="pass" placeholder="Mínimo 6 caracteres" required>

        <label>WhatsApp de Contacto</label>
        <input type="tel" id="whatsapp" placeholder="3876123456" required>

        <label>Categoría</label>
        <select id="categoria">
            <option value="alimentos">Alimentos y Bebidas</option>
            <option value="farmacia">Salud y Farmacia</option>
            <option value="ferreteria">Hogar y Ferretería</option>
            <option value="otros">Otros</option>
        </select>

        <button type="submit" class="btn-enviar">ENVIAR SOLICITUD</button>
    </form>

    <div class="footer-links">
        <a href="index.html">← Volver al inicio</a>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('form-registro').onsubmit = async (e) => {
        e.preventDefault();

        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const nuevaSolicitud = {
            nombre: document.getElementById('nombre').value.trim(),
            usuario: document.getElementById('usuario').value.trim().toLowerCase(), // Crucial para el login
            pass: document.getElementById('pass').value.trim(),
            whatsapp: document.getElementById('whatsapp').value.trim(),
            categoria: document.getElementById('categoria').value,
            estado: "pendiente",
            fecha_registro: new Date().toISOString()
        };

        try {
            // Guardamos en la colección temporal de solicitudes
            await addDoc(collection(db, "solicitudes"), nuevaSolicitud);
            alert("¡Solicitud enviada con éxito! Te avisaremos cuando el administrador la apruebe.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Error:", error);
            alert("Hubo un problema al enviar la solicitud. Revisa tu conexión.");
            btn.disabled = false;
            btn.innerText = "ENVIAR SOLICITUD";
        }
    };
</script>

</body>
</html>
