
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Únete a Dónde Compro</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #eee; }
        .form-card { background: white; padding: 30px; border-radius: 10px; width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Registro de Comercio</h2>
        <form id="form-registro">
            <input type="text" id="reg-nombre" placeholder="Nombre del Comercio" required>
            <input type="text" id="reg-usuario" placeholder="Elige un nombre de usuario" required>
            <input type="password" id="reg-pass" placeholder="Crea una contraseña" required>
            <input type="text" id="reg-whatsapp" placeholder="WhatsApp (Ej: 549387...)" required>
            <select id="reg-rubro"></select>
            <button type="submit" id="btn-submit">Enviar Solicitud</button>
        </form>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Cargar rubros dinámicos
        const rubrosSnap = await getDocs(collection(db, "rubros"));
        const select = document.getElementById('reg-rubro');
        rubrosSnap.forEach(d => {
            select.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`;
        });

        document.getElementById('form-registro').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;

            const datos = {
                nombre: document.getElementById('reg-nombre').value,
                usuario: document.getElementById('reg-usuario').value.toLowerCase().trim(),
                pass: document.getElementById('reg-pass').value,
                whatsapp: document.getElementById('reg-whatsapp').value,
                rubro: select.value,
                estado: "pendiente",
                fecha: new Date().toISOString()
            };

            await addDoc(collection(db, "solicitudes"), datos);
            alert("Solicitud enviada. Espera la activación del admin.");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
