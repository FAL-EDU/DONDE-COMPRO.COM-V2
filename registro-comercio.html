<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Comercio - DÓNDE COMPRO.COM</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-registro { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-enviar { width: 100%; background-color: #3498db; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .nota { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="form-registro">
        <h2>Registro de Comercio</h2>
        <form>
            <input type="text" placeholder="Nombre del Comercio" required>
            <input type="email" placeholder="Correo Electrónico (Login)" required>
            <input type="password" placeholder="Contraseña segura" required>
            <input type="text" placeholder="Dirección exacta" required>
            <textarea placeholder="Breve descripción del rubro (ej. Carnicería, Regalería)"></textarea>
            <button type="button" class="btn-enviar">SOLICITAR ALOJAMIENTO</button>
        </form>
        <p class="nota">Su solicitud será revisada por un administrador antes de ser activada. [cite: 17]</p>
    </div>
</body>
</html>
