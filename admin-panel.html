<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-link { padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; color: #bdc3c7; }
        .nav-link:hover, .nav-link.active { background: var(--secondary); color: white; border-left-color: var(--accent); }
        
        /* Contenido */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }

        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--primary); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-approve { background: var(--accent); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin: 20px; }
    </style>

    <script>
        // Función de navegación (Global)
        function navegar(id, elemento) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            elemento.classList.add('active');
        }

        function salir() {
            if(confirm("¿Cerrar sesión?")) {
                window.location.href = 'index.html';[cite: 4]
            }
        }
    </script>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">ADMIN</div>
        <div class="nav-link active" onclick="navegar('solicitudes', this)">📩 Solicitudes</div>
        <div class="nav-link" onclick="navegar('rubros', this)">🏷️ Gestionar Rubros</div>
        <div class="nav-link" onclick="navegar('personalizar', this)">🎨 Personalización</div>
        <button onclick="salir()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <!-- SOLICITUDES -->
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Admisión de Comercios</h2>
                <table>
                    <thead>
                        <tr><th>Comercio</th><th>WhatsApp</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="tabla-solicitudes">
                        <tr><td colspan="3">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- RUBROS -->
        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestión de Rubros</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="nuevo-rubro" placeholder="Nombre del rubro..." style="flex:1; padding:10px;">
                    <button class="btn btn-approve" onclick="window.agregarRubro()">+ Añadir</button>
                </div>
                <ul id="lista-rubros"></ul>
            </div>
        </div>

        <!-- PERSONALIZACIÓN -->
        <div id="personalizar" class="section">
            <div class="card">
                <h2>Personalización Visual</h2>
                <label>URL Logo Institucional:</label><br>
                <input type="text" id="config-logo" style="width:100%; padding:10px; margin:10px 0;"><br>
                <button class="btn btn-approve" onclick="alert('Configuración guardada')">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración limpia sin caracteres extraños
        const firebaseConfig = {
            apiKey: "AIzaSyBYdnEmzLEV6aroL1uNBNrkWdfEGpSDHkw",
            authDomain: "donde-compro-oficial.firebaseapp.com",
            projectId: "donde-compro-oficial",
            storageBucket: "donde-compro-oficial.firebasestorage.app",
            messagingSenderId: "113447539181",
            appId: "1:113447539181:web:6d91fc4fe96bb83d82d7e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cargar solicitudes
        window.obtenerDatos = async () => {
            const tbody = document.getElementById('tabla-solicitudes');
            try {
                const querySnapshot = await getDocs(collection(db, "solicitudes"));[cite: 3]
                tbody.innerHTML = "";
                querySnapshot.forEach((d) => {
                    const item = d.data();
                    tbody.innerHTML += `<tr>
                        <td>${item.nombre || 'S/N'}</td>
                        <td>${item.whatsapp || 'S/D'}</td>
                        <td>
                            <button class="btn btn-approve" onclick="window.aprobar('${d.id}')">Aprobar</button>
                            <button class="btn btn-delete" onclick="window.eliminar('${d.id}', 'solicitudes')">X</button>
                        </td>
                    </tr>`;
                });
            } catch (error) {
                tbody.innerHTML = "<tr><td colspan='3'>Error al cargar datos.</td></tr>";
            }
        };

        // Eliminar registros
        window.eliminar = async (id, col) => {
            if(confirm("¿Seguro que deseas eliminarlo?")) {
                await deleteDoc(doc(db, col, id));[cite: 3]
                window.obtenerDatos();
            }
        };

        window.agregarRubro = async () => {
            const nombre = document.getElementById('nuevo-rubro').value;
            if(nombre) {
                await setDoc(doc(collection(db, "rubros")), { nombre: nombre });[cite: 3]
                document.getElementById('nuevo-rubro').value = "";
                alert("Rubro añadido");
                // Aquí podrías recargar una lista de rubros
            }
        };

        window.aprobar = (id) => {
            alert("Comercio " + id + " aprobado. (Moviendo a colección de comercios activos)");[cite: 2]
        };

        // Inicio
        window.obtenerDatos();
    </script>
</body>
</html>
