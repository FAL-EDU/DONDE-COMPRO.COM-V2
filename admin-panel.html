<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: rgba(0,0,0,0.2); text-align: center; font-weight: bold; }
        .nav-group { padding: 15px; flex: 1; }
        .nav-link { color: #bdc3c7; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; display: block; }
        .nav-link:hover, .nav-link.active { background: var(--secondary); color: white; }

        /* Content */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Elements */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--accent); color: white; }
        .btn-logout { background: var(--danger); color: white; margin: 20px; width: calc(100% - 40px); }
        input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 8px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">DONDE COMPRO - ADMIN</div>
        <div class="nav-group">
            <div class="nav-link active" onclick="verSection('solicitudes')">📩 Solicitudes</div>
            <div class="nav-link" onclick="verSection('comercios')">🏪 Comercios Activos</div>
            <div class="nav-link" onclick="verSection('rubros')">🏷️ Gestionar Rubros</div>
            <div class="nav-link" onclick="verSection('config')">⚙️ Configuración / Logo</div>
        </div>
        <button onclick="cerrarSesion()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <!-- SECCIÓN SOLICITUDES -->
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <table style="width:100%; text-align:left;">
                    <thead><tr><th>Comercio</th><th>WhatsApp</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-sol"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN RUBROS -->
        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestión de Rubros</h2>
                <button class="btn btn-add" onclick="mostrarModal()">+ Nuevo Rubro</button>
                <div id="lista-rubros-container" style="margin-top:20px;"></div>
            </div>
        </div>

        <!-- SECCIÓN CONFIGURACIÓN -->
        <div id="config" class="section">
            <div class="card">
                <h2>Personalización de la App</h2>
                <label>URL del Logo (Superior)</label>
                <input type="text" id="cfg-logo" placeholder="https://...">
                <label>URL Imagen de Fondo (Watermark Frontpage)</label>
                <input type="text" id="cfg-fondo" placeholder="https://...">
                <button class="btn btn-add" onclick="guardarAjustes()">Guardar Todo</button>
            </div>
        </div>
    </div>

    <!-- MODAL RUBRO -->
    <div id="modal-rubro" class="modal">
        <div class="modal-content">
            <h3>Añadir Nuevo Rubro</h3>
            <input type="text" id="nuevo-nombre-rubro" placeholder="Ej: FARMACIA">
            <button class="btn btn-add" style="width:100%;" onclick="procesarGuardarRubro()">GUARDAR RUBRO</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#eee;" onclick="ocultarModal()">Cancelar</button>
        </div>
    </div>

    <!-- 1. CARGA DE FIREBASE (MÓDULO) -->
    <script type="module">
        import { db } from './firebase-config.js'; // Usamos tu archivo fuente
        import { collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // EXPOSICIÓN GLOBAL: El secreto para que los botones funcionen
        window.db = db;
        window.fs = { collection, getDocs, doc, setDoc, deleteDoc, getDoc };

        // Al cargar, traer datos
        window.onload = () => {
            cargarSolicitudes();
            cargarConfigBase();
        };

        // --- LÓGICA DE DATOS ---
        window.cargarSolicitudes = async () => {
            try {
                const snap = await getDocs(collection(db, "solicitudes"));
                const lista = document.getElementById('lista-sol');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    lista.innerHTML += `<tr><td>${s.nombre}</td><td>${s.whatsapp}</td>
                        <td><button class="btn btn-add" onclick="aprobar('${d.id}')">Activar</button></td></tr>`;
                });
            } catch(e) { console.error(e); }
        };

        window.procesarGuardarRubro = async () => {
            const nombre = document.getElementById('nuevo-nombre-rubro').value.trim();
            if(!nombre) return;
            await setDoc(doc(db, "rubros", nombre.toLowerCase()), { nombre: nombre });[cite: 5]
            document.getElementById('nuevo-nombre-rubro').value = "";
            ocultarModal();
            alert("Rubro guardado");
        };

        window.guardarAjustes = async () => {
            const logo = document.getElementById('cfg-logo').value;
            const fondo = document.getElementById('cfg-fondo').value;
            await setDoc(doc(db, "configuracion", "apariencia"), { logo, fondo_inicio: fondo });[cite: 5]
            alert("Apariencia actualizada");
        };

        async function cargarConfigBase() {
            const docRef = doc(db, "configuracion", "apariencia");
            const snap = await getDoc(docRef);
            if(snap.exists()){
                document.getElementById('cfg-logo').value = snap.data().logo || "";
                document.getElementById('cfg-fondo').value = snap.data().fondo_inicio || "";
            }
        }
    </script>

    <!-- 2. LÓGICA DE INTERFAZ (SCRIPT NORMAL) -->
    <script>
        function verSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function cerrarSesion() {
            if(confirm("¿Seguro que quieres salir?")) {
                localStorage.removeItem("sesion");[cite: 4]
                window.location.href = "login.html";
            }
        }

        function mostrarModal() { document.getElementById('modal-rubro').style.display = 'flex'; }
        function ocultarModal() { document.getElementById('modal-rubro').style.display = 'none'; }
    </script>
</body>
</html>
