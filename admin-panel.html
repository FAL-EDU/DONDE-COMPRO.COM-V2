<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-link { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; color: #bdc3c7; text-decoration: none; border-left: 4px solid transparent; }
        .nav-link:hover { background: var(--secondary); color: white; }
        .nav-link.active { background: var(--secondary); color: white; border-left-color: var(--accent); }
        
        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tables & Cards */
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }

        /* Buttons */
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.85rem; }
        .btn-approve { background: var(--accent); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin: 20px; padding: 12px; }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* Form elements */
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">ADMIN</div>
        <div class="nav-link active" onclick="navegar('solicitudes')">📩 Solicitudes</div>
        <div class="nav-link" onclick="navegar('rubros')">🏷️ Gestionar Rubros</div>
        <div class="nav-link" onclick="navegar('config')">⚙️ Configuración</div>
        <button onclick="salir()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <!-- SECCIÓN SOLICITUDES -->
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <p style="color: #666;">Gestiona los comercios que desean unirse a la red.</p>
                <table>
                    <thead>
                        <tr>
                            <th>Comercio</th>
                            <th>WhatsApp</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-solicitudes">
                        <!-- Datos de Firebase aquí -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN RUBROS -->
        <div id="rubros" class="section">
            <div class="card">
                <h2>Categorías de Negocio</h2>
                <div class="input-group">
                    <input type="text" id="nombre-rubro" placeholder="Ej: Veterinaria, Panadería...">
                    <button class="btn btn-approve" onclick="window.crearRubro()">+ Añadir Rubro</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Nombre del Rubro</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="lista-rubros"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN CONFIGURACIÓN -->
        <div id="config" class="section">
            <div class="card">
                <h2>Identidad Institucional</h2>
                <div style="max-width: 500px;">
                    <label style="display:block; margin-bottom:8px; font-weight:bold;">URL Logo (.png/.jpg)</label>
                    <input type="text" id="cfg-logo" style="width:100%; margin-bottom:20px;">
                    <label style="display:block; margin-bottom:8px; font-weight:bold;">URL Fondo de Agua</label>
                    <input type="text" id="cfg-fondo" style="width:100%; margin-bottom:20px;">
                    <button class="btn btn-approve" onclick="window.guardarAjustes()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Navegación Global (Independiente de Firebase para evitar errores de carga)
        function navegar(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function salir() {
            localStorage.clear();[cite: 4]
            window.location.href = 'login.html';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración unificada con tu proyecto[cite: 4]
        const firebaseConfig = {
          apiKey: "AIzaSyBYdnEmzLEV6aroL1uNBNrkWdfEGpSDHkw",
          authDomain: "donde-compro-oficial.firebaseapp.com",
          projectId: "donde-compro-oficial",
          storageBucket: "donde-compro-oficial.firebasestorage.app",
          messagingSenderId: "113447539181",
          appId: "1:113447539181:web:6d91fc4fe96bb83d82d7e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CARGAR SOLICITUDES
        const cargarSolicitudes = async () => {
            const snap = await getDocs(collection(db, "solicitudes"));
            const tabla = document.getElementById('tabla-solicitudes');
            tabla.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                tabla.innerHTML += `<tr>
                    <td style="font-weight:bold;">${s.nombre}</td>
                    <td>${s.whatsapp}</td>
                    <td>
                        <button class="btn btn-approve" onclick="window.aprobar('${d.id}')">Aprobar</button>
                        <button class="btn btn-delete" onclick="window.eliminarSolicitud('${d.id}')">Eliminar</button>
                    </td>
                </tr>`;
            });
        };

        // ACCIÓN: ELIMINAR (Limpiar duplicados o pruebas)
        window.eliminarSolicitud = async (id) => {
            if(confirm("¿Deseas eliminar permanentemente esta solicitud?")) {
                try {
                    await deleteDoc(doc(db, "solicitudes", id));
                    cargarSolicitudes();
                } catch(e) { console.error(e); }
            }
        };

        // ACCIÓN: APROBAR (Mover a comercios activos)
        window.aprobar = async (id) => {
            const ref = doc(db, "solicitudes", id);
            const data = (await getDoc(ref)).data();
            await setDoc(doc(db, "comercios", id), { ...data, estado: "activo" });
            await deleteDoc(ref);
            alert("Comercio activado con éxito");
            cargarSolicitudes();
        };

        // GESTIÓN DE RUBROS
        window.crearRubro = async () => {
            const r = document.getElementById('nombre-rubro').value.trim();
            if(!r) return;
            await setDoc(doc(db, "rubros", r.toLowerCase()), { nombre: r });
            document.getElementById('nombre-rubro').value = "";
            cargarRubros();
        };

        const cargarRubros = async () => {
            const snap = await getDocs(collection(db, "rubros"));
            const lista = document.getElementById('lista-rubros');
            lista.innerHTML = "";
            snap.forEach(d => {
                lista.innerHTML += `<tr><td>${d.data().nombre}</td>
                <td><button class="btn btn-delete" onclick="window.borrarRubro('${d.id}')">Borrar</button></td></tr>`;
            });
        };

        window.borrarRubro = async (id) => {
            if(confirm("¿Eliminar este rubro?")) {
                await deleteDoc(doc(db, "rubros", id));
                cargarRubros();
            }
        };

        // Inicio
        cargarSolicitudes();
        cargarRubros();
    </script>
</body>
</html>
