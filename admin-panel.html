<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: var(--bg); padding: 12px; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-check { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; margin-left: 5px; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; background: #f39c12; color: white; }
        .logout { color: white; text-decoration: none; font-size: 0.9rem; border: 1px solid white; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <strong>DONDE COMPRO - ADMIN</strong>
    <a href="#" onclick="cerrarSesion()" class="logout">Cerrar Sesión</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Solicitudes de Comercios Pendientes</h2>
        <p>Aquí aparecen los comercios que se registraron y esperan tu aprobación para poder subir productos.</p>
        
        <table>
            <thead>
                <tr>
                    <th>Comercio</th>
                    <th>Usuario (Email)</th>
                    <th>WhatsApp</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-solicitudes">
                <!-- Los datos se cargan aquí automáticamente -->
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. Seguridad: Verificar si es admin
    if (localStorage.getItem("sesion") !== "admin") {
        window.location.href = "login.html";
    }

    // 2. Función para cargar solicitudes
    const cargarSolicitudes = async () => {
        const lista = document.getElementById('lista-solicitudes');
        lista.innerHTML = "<tr><td colspan='5'>Cargando solicitudes...</td></tr>";
        
        try {
            const snap = await getDocs(collection(db, "solicitudes"));
            lista.innerHTML = ""; // Limpiar

            if (snap.empty) {
                lista.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No hay solicitudes pendientes.</td></tr>";
                return;
            }

            snap.forEach(d => {
                const s = d.data();
                lista.innerHTML += `
                    <tr>
                        <td><strong>${s.nombre}</strong></td>
                        <td>${s.usuario}</td>
                        <td>${s.whatsapp}</td>
                        <td><span class="badge">PENDIENTE</span></td>
                        <td>
                            <button onclick="activarComercio('${d.id}')" class="btn btn-check">ACTIVAR</button>
                            <button onclick="rechazarComercio('${d.id}')" class="btn btn-del">X</button>
                        </td>
                    </tr>`;
            });
        } catch (error) {
            console.error("Error al cargar:", error);
            lista.innerHTML = "<tr><td colspan='5' style='color:red;'>Error al conectar con Firebase.</td></tr>";
        }
    };

    // 3. Función para Activar (Mover de 'solicitudes' a 'comercios')
    window.activarComercio = async (id) => {
        try {
            const refSolicitud = doc(db, "solicitudes", id);
            const snap = await getDoc(refSolicitud);

            if (snap.exists()) {
                const datos = snap.data();
                // Lo guardamos en la colección definitiva[cite: 5]
                await setDoc(doc(db, "comercios", id), {
                    ...datos,
                    estado: "activo",
                    fecha_activacion: new Date().toISOString()
                });
                // Borramos la solicitud[cite: 5]
                await deleteDoc(refSolicitud);
                alert("¡Comercio activado con éxito! Ahora ya puede iniciar sesión.");
                cargarSolicitudes();
            }
        } catch (e) {
            alert("Error al activar");
        }
    };

    // 4. Función para Rechazar
    window.rechazarComercio = async (id) => {
        if(confirm("¿Estás seguro de rechazar y borrar esta solicitud?")) {
            await deleteDoc(doc(db, "solicitudes", id));
            cargarSolicitudes();
        }
    };

    window.cerrarSesion = () => {
        localStorage.clear();
        window.location.href = "login.html";
    };

    // Iniciar carga
    cargarSolicitudes();

</script>

</body>
</html>
