<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - DÓNDE COMPRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        
        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; color: var(--primary); }
        
        /* Botones */
        .btn-save { background: var(--secondary); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        
        .section { margin-top: 40px; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .section h2 { margin-top: 0; font-size: 1.2rem; color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Panel de Control (Admin)</h1>

        <div class="section">
            <h2>Solicitudes de Nuevos Comercios</h2>
            <p>Aquí aparecen quienes enviaron su formulario desde la web principal.</p>
            <table>
                <thead>
                    <tr>
                        <th>Comercio</th>
                        <th>Dirección</th>
                        <th>WhatsApp</th>
                        <th>Mensaje</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-solicitudes">
                    </tbody>
            </table>
        </div>

        <div class="section">
            <h2>Comercios Activos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Rubro</th>
                        <th>Usuario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-comercios">
                    </tbody>
            </table>
        </div>

        <div style="margin-top: 20px;">
            <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: bold;">← Volver al Inicio</a>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. ESCUCHAR SOLICITUDES EN TIEMPO REAL
        onSnapshot(collection(db, "solicitudes"), (snap) => {
            const tbody = document.getElementById('lista-solicitudes');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${s.nombre}</strong></td>
                        <td>${s.direccion || 'No especificada'}</td>
                        <td>${s.whatsapp}</td>
                        <td><small>${s.mensaje || '-'}</small></td>
                        <td>
                            <button class="btn-save" onclick="aprobarComercio('${d.id}', '${s.nombre}', '${s.rubro}', '${s.whatsapp}', '${s.pass}', '${s.direccion}')">
                                DAR DE ALTA
                            </button>
                            <button class="btn-delete" onclick="eliminarDoc('solicitudes','${d.id}')">X</button>
                        </td>
                    </tr>`;
            });
        });

        // 2. FUNCIÓN PARA DAR DE ALTA AUTOMÁTICAMENTE (Incluye Dirección)
        window.aprobarComercio = async (id, nombre, rubro, whatsapp, pass, direccion) => {
            // Generamos un usuario sugerido basado en el nombre
            const usuarioSugerido = nombre.replace(/\s+/g, '_').toLowerCase();
            
            try {
                // Guardamos en la colección oficial de comercios
                await addDoc(collection(db, "comercios"), {
                    nombre: nombre,
                    rubro: rubro,
                    direccion: direccion, // Se carga automáticamente de la solicitud
                    whatsapp: whatsapp,
                    password: pass,
                    usuario: usuarioSugerido,
                    rol: "comerciante",
                    fechaAlta: new Date().toLocaleString()
                });

                // Borramos la solicitud ya procesada
                await deleteDoc(doc(db, "solicitudes", id));
                alert("¡Comercio " + nombre + " dado de alta con éxito!");
            } catch (e) {
                console.error(e);
                alert("Error al procesar el alta.");
            }
        };

        // 3. LISTAR COMERCIOS ACTIVOS
        onSnapshot(collection(db, "comercios"), (snap) => {
            const tbody = document.getElementById('lista-comercios');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${c.nombre}</td>
                        <td>${c.rubro}</td>
                        <td><code>${c.usuario}</code></td>
                        <td>
                            <button class="btn-delete" onclick="eliminarDoc('comercios','${d.id}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        });

        // 4. FUNCIÓN GENÉRICA PARA ELIMINAR
        window.eliminarDoc = async (coleccion, id) => {
            if(confirm("¿Estás seguro de eliminar este registro?")) {
                await deleteDoc(doc(db, coleccion, id));
            }
        };
    </script>
</body>
</html>
