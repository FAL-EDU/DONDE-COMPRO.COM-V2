<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: rgba(0,0,0,0.2); text-align: center; font-weight: bold; }
        .nav-link { color: #bdc3c7; padding: 15px; cursor: pointer; text-decoration: none; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--secondary); color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: var(--danger); color: white; margin: 20px; }
        .btn-add { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">DONDE COMPRO ADMIN</div>
        <div class="nav-link active" id="link-sol" onclick="navegar('solicitudes')">📩 Solicitudes</div>
        <div class="nav-link" id="link-rub" onclick="navegar('rubros')">🏷️ Gestionar Rubros</div>
        <div class="nav-link" id="link-cfg" onclick="navegar('config')">⚙️ Configuración</div>
        <button onclick="logout()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <table id="tabla-solicitudes">
                    <thead><tr><th>Comercio</th><th>Usuario</th><th>Acción</th></tr></thead>
                    <tbody id="lista-solicitudes"></tbody>
                </table>
            </div>
        </div>

        <div id="rubros" class="section">
            <div class="card">
                <h2>Rubros</h2>
                <p>Aquí aparecerá la lista de rubros pronto.</p>
            </div>
        </div>

        <div id="config" class="section">
            <div class="card">
                <h2>Configuración</h2>
                <p>Configuración de logo y fondo.</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT DE NAVEGACIÓN SIMPLE (Para asegurar que los botones funcionen) -->
    <script>
        function navegar(id) {
            console.log("Cambiando a sección:", id);
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function logout() {
            localStorage.clear();[cite: 4]
            window.location.href = 'login.html';
        }
    </script>

    <!-- SCRIPT DE FIREBASE -->
    <script type="module">
        // IMPORTANTE: Asegúrate de que firebase-config.js exporte 'db' correctamente[cite: 5]
        import { db } from './firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function inicializar() {
            console.log("Iniciando conexión con Firebase...");
            try {
                const querySnapshot = await getDocs(collection(db, "solicitudes"));[cite: 5]
                const lista = document.getElementById('lista-solicitudes');
                lista.innerHTML = "";

                if (querySnapshot.empty) {
                    lista.innerHTML = "<tr><td colspan='3'>No hay solicitudes pendientes.</td></tr>";
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const fila = `<tr>
                        <td>${data.nombre || 'Sin nombre'}</td>
                        <td>${data.usuario || 'Anónimo'}</td>
                        <td><button class="btn btn-add">Activar</button></td>
                    </tr>`;
                    lista.innerHTML += fila;
                });
                console.log("Datos cargados con éxito.");
            } catch (error) {
                console.error("Error detectado:", error);
                alert("ERROR DE FIREBASE: " + error.message);[cite: 7]
            }
        }

        // Ejecutar carga
        inicializar();
    </script>
</body>
</html>
