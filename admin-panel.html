<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; padding: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 25px; background: rgba(0,0,0,0.2); text-align: center; font-weight: bold; font-size: 1.1rem; }
        .nav-group { padding: 15px; flex: 1; }
        .nav-link { color: #bdc3c7; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; display: block; }
        .nav-link.active { background: var(--secondary); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8f9fa; padding: 15px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--accent); color: white; }
        .btn-del { background: var(--danger); color: white; }
        .btn-logout { background: #c0392b; color: white; margin: 20px; width: calc(100% - 40px); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 35px; border-radius: 20px; width: 420px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        label { display: block; text-align: left; font-weight: 600; margin-bottom: 5px; color: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">DONDE COMPRO - ADMIN</div>
        <div class="nav-group">
            <div id="btn-sol" class="nav-link active" onclick="showSection('solicitudes')">📩 Solicitudes</div>
            <div id="btn-com" class="nav-link" onclick="showSection('comercios')">🏪 Comercios Activos</div>
            <div id="btn-rub" class="nav-link" onclick="showSection('rubros')">🏷️ Gestionar Rubros</div>
            <div id="btn-cfg" class="nav-link" onclick="showSection('config')">⚙️ Configuración / Logo</div>
        </div>
        <button onclick="cerrarSesion()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <table>
                    <thead><tr><th>Comercio</th><th>WhatsApp</th><th>Usuario</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-solicitudes"></tbody>
                </table>
            </div>
        </div>

        <div id="comercios" class="section">
            <div class="card">
                <h2>Comercios Activos</h2>
                <label>Filtrar por Rubro:</label>
                <select id="filtro-rubro" onchange="cargarComerciosActivos()"><option value="todos">Todos</option></select>
                <table>
                    <thead><tr><th>Comercio</th><th>Rubro</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-activos"></tbody>
                </table>
            </div>
        </div>

        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestión de Rubros</h2>
                <button class="btn btn-add" onclick="abrirModalRubro()">+ Nuevo Rubro</button>
                <table>
                    <thead><tr><th>Nombre</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-rubros"></tbody>
                </table>
            </div>
        </div>

        <div id="config" class="section">
            <div class="card">
                <h2>Personalización de la APP</h2>
                <label>URL del Logo</label>
                <input type="text" id="app-logo">
                <label>URL Imagen de Fondo (Watermark)</label>
                <input type="text" id="app-background">
                <button class="btn btn-add" onclick="guardarConfig()">Guardar Apariencia</button>
            </div>
        </div>
    </div>

    <div id="modal-rubro" class="modal">
        <div class="modal-content">
            <h3>Añadir Nuevo Rubro</h3>
            <input type="text" id="nuevo-rubro-nombre" placeholder="Ej: FARMACIA">
            <button class="btn btn-add" style="width: 100%;" onclick="guardarRubro()">GUARDAR RUBRO</button>
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="cerrarModalRubro()">Cancelar</button>
        </div>
    </div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // EXPONER FUNCIONES AL OBJETO WINDOW (Para que los botones funcionen)
    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'comercios') cargarComerciosActivos();
        if(id === 'rubros') cargarRubros();
        if(id === 'config') cargarConfigExistente();
    };

    window.cerrarSesion = () => {
        if(confirm("¿Cerrar sesión?")) {
            localStorage.clear();[cite: 4]
            window.location.href = "login.html";
        }
    };

    window.abrirModalRubro = () => document.getElementById('modal-rubro').style.display='flex';
    window.cerrarModalRubro = () => document.getElementById('modal-rubro').style.display='none';

    window.guardarRubro = async () => {
        const nombre = document.getElementById('nuevo-rubro-nombre').value.trim();
        if(!nombre) return;
        await setDoc(doc(db, "rubros", nombre.toLowerCase()), { nombre: nombre });[cite: 5]
        document.getElementById('nuevo-rubro-nombre').value = "";
        cerrarModalRubro();
        cargarRubros();
    };

    window.eliminarRubro = async (id) => {
        if(confirm("¿Eliminar rubro?")) {
            await deleteDoc(doc(db, "rubros", id));[cite: 5]
            cargarRubros();
        }
    };

    window.activar = async (id) => {
        const snap = await getDoc(doc(db, "solicitudes", id));
        if(snap.exists()){
            await setDoc(doc(db, "comercios", id), { ...snap.data(), estado: "activo" });[cite: 5]
            await deleteDoc(doc(db, "solicitudes", id));[cite: 5]
            cargarSolicitudes();
        }
    };

    window.guardarConfig = async () => {
        const logo = document.getElementById('app-logo').value.trim();
        const fondo = document.getElementById('app-background').value.trim();
        await setDoc(doc(db, "configuracion", "apariencia"), { logo, fondo_inicio: fondo });[cite: 5]
        alert("Configuración guardada");
    };

    // FUNCIONES DE CARGA INTERNA
    const cargarSolicitudes = async () => {
        const snap = await getDocs(collection(db, "solicitudes"));
        const lista = document.getElementById('lista-solicitudes');
        lista.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            lista.innerHTML += `<tr><td>${s.nombre}</td><td>${s.whatsapp}</td><td>${s.usuario}</td>
                <td><button onclick="activar('${d.id}')" class="btn btn-add">Activar</button></td></tr>`;
        });
    };

    const cargarRubros = async () => {
        const snap = await getDocs(collection(db, "rubros"));
        const lista = document.getElementById('lista-rubros');
        lista.innerHTML = "";
        snap.forEach(d => {
            lista.innerHTML += `<tr><td>${d.data().nombre}</td>
                <td><button onclick="eliminarRubro('${d.id}')" class="btn btn-del">Eliminar</button></td></tr>`;
        });
    };

    const cargarConfigExistente = async () => {
        const snap = await getDoc(doc(db, "configuracion", "apariencia"));
        if(snap.exists()){
            document.getElementById('app-logo').value = snap.data().logo || "";
            document.getElementById('app-background').value = snap.data().fondo_inicio || "";
        }
    };

    // Iniciar con solicitudes
    cargarSolicitudes();
</script>
</body>
</html>
