<div class="grid">
            <div class="card">
                <h2>🎨 Personalización de la Página</h2>
                <label>URL del Logo:</label>
                <input type="text" id="logo-url" placeholder="https://link-de-tu-logo.png">
                <label>URL Imagen de Fondo:</label>
                <input type="text" id="fondo-url" placeholder="https://link-de-tu-fondo.jpg">
                <button class="btn-edit" id="btn-guardar-estetica">ACTUALIZAR DISEÑO</button>
            </div>

            <div class="card">
                <h2>📊 Consulta por Rubro</h2>
                <p style="font-size: 0.85rem; color: #666;">Selecciona un rubro para ver cuántos comercios hay y listar sus nombres.</p>
                
                <select id="filtro-rubro-select">
                    <option value="">Seleccionar rubro para consultar...</option>
                </select>
                
                <div id="resultado-filtro" style="margin-top: 15px; display: none; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px solid #ddd;">
                    <p id="conteo-rubro" style="font-weight: bold; color: var(--secondary); margin-top: 0;"></p>
                    <ul id="lista-nombres-filtro" style="margin: 0; padding-left: 20px; font-size: 0.9rem;"></ul>
                </div>
            </div>
        </div>

<script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, setDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- LÓGICA DEL NUEVO FILTRO POR RUBRO ---
        const selectFiltro = document.getElementById('filtro-rubro-select');
        const contenedorResultado = document.getElementById('resultado-filtro');
        const textoConteo = document.getElementById('conteo-rubro');
        const listaNombres = document.getElementById('lista-nombres-filtro');

        // Poblar el select de filtro con los rubros existentes
        onSnapshot(collection(db, "rubros"), (snap) => {
            selectFiltro.innerHTML = '<option value="">Seleccionar rubro para consultar...</option>';
            snap.forEach(d => {
                selectFiltro.innerHTML += `<option value="${d.data().nombre}">${d.data().nombre}</option>`;
            });
        });

        // Actuar a demanda cuando el admin selecciona un rubro
        selectFiltro.onchange = async () => {
            const rubroSeleccionado = selectFiltro.value;
            if (!rubroSeleccionado) {
                contenedorResultado.style.display = 'none';
                return;
            }

            const q = query(collection(db, "comercios"), where("rubro", "==", rubroSeleccionado));
            const snap = await getDocs(q);
            
            listaNombres.innerHTML = "";
            let contador = 0;

            snap.forEach(doc => {
                contador++;
                listaNombres.innerHTML += `<li>${doc.data().nombre}</li>`;
            });

            textoConteo.innerText = `Total en ${rubroSeleccionado}: ${contador} comercio(s)`;
            contenedorResultado.style.display = 'block';
        };

        // ... (Mantener todas las funciones anteriores: cargarEstetica, gestionar rubros, solicitudes, etc.) ...
    </script>
