<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cargarAdmin = async () => {
        const snap = await getDocs(collection(db, "solicitudes"));
        const lista = document.getElementById('lista-solicitudes');
        lista.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            lista.innerHTML += `
                <tr>
                    <td>${s.nombre}</td>
                    <td>${s.usuario}</td>
                    <td>
                        <button onclick="activar('${d.id}')" style="background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Activar</button>
                        <button onclick="rechazar('${d.id}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-left:5px;">Rechazar</button>
                    </td>
                </tr>`;
        });
    };

    window.activar = async (id) => {
        const ref = doc(db, "solicitudes", id);
        const snap = await getDoc(ref);
        if(snap.exists()){
            await setDoc(doc(db, "comercios", id), { ...snap.data(), estado: "activo" });
            await deleteDoc(ref);
            alert("Comercio activado");
            cargarAdmin();
        }
    };

    window.rechazar = async (id) => {
        if(confirm("¿Eliminar solicitud?")) {
            await deleteDoc(doc(db, "solicitudes", id));
            cargarAdmin();
        }
    };
    cargarAdmin();
</script>
