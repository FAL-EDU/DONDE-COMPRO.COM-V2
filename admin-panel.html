<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - Pro</title>
    <style>
        :root { --primary: #27ae60; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-act { background: var(--primary); }
        .btn-del { background: var(--danger); margin-left: 5px; }
        .no-mail { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Solicitudes Pendientes</h2>
        <table>
            <thead>
                <tr><th>Comercio</th><th>WhatsApp</th><th>Email Detectado</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tabla-solicitudes"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Comercios Activos</h2>
        <table>
            <tbody id="tabla-activos"></tbody>
        </table>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Función para leer cualquier variante de email
        const obtenerEmail = (d) => d.usuario || d.email || d.correo || null;

        const cargarDatos = async () => {
            const solSnap = await getDocs(collection(db, "solicitudes"));
            const resSoli = document.getElementById('tabla-solicitudes');
            resSoli.innerHTML = "";

            solSnap.forEach(docSnap => {
                const data = docSnap.data();
                const email = obtenerEmail(data);
                resSoli.innerHTML += `
                    <tr>
                        <td>${data.nombre || 'S/N'}</td>
                        <td>${data.whatsapp || '-'}</td>
                        <td class="${!email ? 'no-mail' : ''}">${email || 'Falta Correo'}</td>
                        <td>
                            <button class="btn btn-act" onclick="activar('${docSnap.id}')">Activar</button>
                            <button class="btn btn-del" onclick="rechazar('${docSnap.id}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        };

        // Activa y UNIFICA el campo para que el login funcione
        window.activar = async (id) => {
            const ref = doc(db, "solicitudes", id);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                const data = snap.data();
                let email = obtenerEmail(data);

                if (!email) email = prompt("Ingrese correo para este comercio:");

                if (email && email.includes('@')) {
                    await setDoc(doc(db, "comercios", id), {
                        ...data,
                        usuario: email.trim().toLowerCase(), // CAMPO CLAVE PARA LOGIN
                        estado: "activo"
                    });
                    await deleteDoc(ref);
                    alert("¡Activado!");
                    cargarDatos();
                }
            }
        };

        // Elimina solicitudes malas o duplicadas
        window.rechazar = async (id) => {
            if (confirm("¿Eliminar esta solicitud definitivamente?")) {
                await deleteDoc(doc(db, "solicitudes", id));
                cargarDatos();
            }
        };

        cargarDatos();
    </script>
</body>
</html>
