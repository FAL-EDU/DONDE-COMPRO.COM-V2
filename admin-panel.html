<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: rgba(0,0,0,0.2); text-align: center; font-weight: bold; }
        .nav-link { color: #bdc3c7; padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--secondary); color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: var(--danger); color: white; margin: 20px; width: calc(100% - 40px); }
        .btn-add { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">DONDE COMPRO ADMIN</div>
        <div class="nav-link active" onclick="navegar('solicitudes')">📩 Solicitudes</div>
        <div class="nav-link" onclick="navegar('rubros')">🏷️ Gestionar Rubros</div>
        <div class="nav-link" onclick="navegar('config')">⚙️ Configuración / Logo</div>
        <button onclick="salir()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <!-- SECCIÓN SOLICITUDES -->
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <table>
                    <thead><tr><th>Comercio</th><th>WhatsApp</th><th>Acción</th></tr></thead>
                    <tbody id="lista-solicitudes"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN RUBROS -->
        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestionar Rubros</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="input-rubro" placeholder="Ej: FARMACIA" style="flex:1; padding:8px;">
                    <button class="btn btn-add" onclick="window.agregarRubro()">+ Añadir</button>
                </div>
                <table shadow>
                    <thead><tr><th>Nombre del Rubro</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-rubros"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN CONFIGURACIÓN -->
        <div id="config" class="section">
            <div class="card">
                <h2>Apariencia del Sitio</h2>
                <label>URL Logo Institucional:</label>
                <input type="text" id="cfg-logo" style="width:100%; padding:8px; margin:10px 0;">
                <label>URL Fondo de Agua (Header):</label>
                <input type="text" id="cfg-fondo" style="width:100%; padding:8px; margin:10px 0;">
                <button class="btn btn-add" onclick="window.guardarAjustes()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        // Función de navegación corregida
        function navegar(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function salir() {
            localStorage.clear();[cite: 4]
            window.location.href = 'login.html';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración directa de Firebase[cite: 9]
        const firebaseConfig = {
            apiKey: "AIzaSyBYdnEmzLEV6aroL1uNBNrkWdfEGpSDHkw",
            authDomain: "donde-compro-oficial.firebaseapp.com",
            projectId: "donde-compro-oficial",
            storageBucket: "donde-compro-oficial.firebasestorage.app",
            messagingSenderId: "113447539181",
            appId: "1:113447539181:web:6d91fc4fe96bb83d82d7e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GESTIÓN DE RUBROS ---
        window.agregarRubro = async () => {
            const rubro = document.getElementById('input-rubro').value.trim();
            if(!rubro) return;
            try {
                await setDoc(doc(db, "rubros", rubro.toLowerCase()), { nombre: rubro });[cite: 5]
                document.getElementById('input-rubro').value = "";
                cargarRubros();
            } catch(e) { console.error("Error:", e); }
        };

        const cargarRubros = async () => {
            const snap = await getDocs(collection(db, "rubros"));[cite: 5]
            const lista = document.getElementById('lista-rubros');
            lista.innerHTML = "";
            snap.forEach(d => {
                lista.innerHTML += `<tr><td>${d.data().nombre}</td>
                <td><button class="btn" style="background:#e74c3c; color:white;" onclick="window.borrarRubro('${d.id}')">Eliminar</button></td></tr>`;
            });
        };

        window.borrarRubro = async (id) => {
            if(confirm("¿Eliminar rubro?")) {
                await deleteDoc(doc(db, "rubros", id));[cite: 5]
                cargarRubros();
            }
        };

        // --- GESTIÓN DE SOLICITUDES ---
        const cargarSolicitudes = async () => {
            const snap = await getDocs(collection(db, "solicitudes"));[cite: 5]
            const lista = document.getElementById('lista-solicitudes');
            lista.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                lista.innerHTML += `<tr><td>${s.nombre}</td><td>${s.whatsapp}</td>
                <td><button class="btn btn-add" onclick="window.aprobar('${d.id}')">Autorizar</button></td></tr>`;
            });
        };

        window.aprobar = async (id) => {
            const ref = doc(db, "solicitudes", id);
            const data = (await getDoc(ref)).data();
            await setDoc(doc(db, "comercios", id), { ...data, estado: "activo" });[cite: 5]
            await deleteDoc(ref);[cite: 5]
            cargarSolicitudes();
        };

        // --- GESTIÓN DE CONFIGURACIÓN ---
        window.guardarAjustes = async () => {
            const logo = document.getElementById('cfg-logo').value;
            const fondo = document.getElementById('cfg-fondo').value;
            await setDoc(doc(db, "configuracion", "apariencia"), { logo, fondo_inicio: fondo });[cite: 5]
            alert("Apariencia actualizada correctamente");
        };

        // Carga inicial
        cargarSolicitudes();
        cargarRubros();
    </script>
</body>
</html>
