<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-link { padding: 18px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; color: #bdc3c7; text-decoration: none; border-left: 4px solid transparent; }
        .nav-link:hover { background: var(--secondary); color: white; }
        .nav-link.active { background: var(--secondary); color: white; border-left-color: var(--accent); }
        
        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-approve { background: var(--accent); color: white; }
        .btn-delete { background: var(--danger); color: white; margin-left: 5px; }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">ADMIN</div>
        <div class="nav-link active" id="link-solicitudes" onclick="navegar('solicitudes')">📩 Solicitudes</div>
        <div class="nav-link" id="link-rubros" onclick="navegar('rubros')">🏷️ Gestionar Rubros</div>
        <button onclick="salir()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <table>
                    <thead>
                        <tr><th>Comercio</th><th>WhatsApp</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="tabla-solicitudes"></tbody>
                </table>
            </div>
        </div>

        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestionar Rubros</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="nuevo-rubro" placeholder="Nombre del rubro..." style="padding:10px; flex:1;">
                    <button class="btn btn-approve" onclick="crearRubro()">+ Añadir</button>
                </div>
                <ul id="lista-rubros" style="list-style:none; padding:0;"></ul>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYdnEmzLEV6aroL1uNBNrkWdfEGpSDHkw",
            authDomain: "donde-compro-oficial.firebaseapp.com",
            projectId: "donde-compro-oficial",
            storageBucket: "donde-compro-oficial.firebasestorage.app",
            messagingSenderId: "113447539181",
            appId: "1:113447539181:web:6d91fc4fe96bb83d82d7e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SOLUCIÓN A LOS ERRORES DE CONSOLA ---
        // Exponemos las funciones al objeto 'window' para que el HTML pueda verlas
        
        window.navegar = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active');
        };

        window.salir = () => {
            if(confirm("¿Cerrar sesión?")) window.location.href = 'index.html';[cite: 4]
        };

        async function cargarDatos() {
            try {
                // Cargar Solicitudes
                const solSnap = await getDocs(collection(db, "solicitudes"));[cite: 3]
                const tabla = document.getElementById('tabla-solicitudes');
                tabla.innerHTML = "";
                solSnap.forEach(d => {
                    const s = d.data();
                    tabla.innerHTML += `<tr>
                        <td>${s.nombre || 'Sin nombre'}</td>
                        <td>${s.whatsapp || 'N/A'}</td>
                        <td>
                            <button class="btn btn-approve" onclick="aprobar('${d.id}')">Aprobar</button>
                            <button class="btn btn-delete" onclick="eliminar('${d.id}')">Eliminar</button>
                        </td>
                    </tr>`;
                });

                // Cargar Rubros
                const rubSnap = await getDocs(collection(db, "rubros"));
                const lista = document.getElementById('lista-rubros');
                lista.innerHTML = "";
                rubSnap.forEach(d => {
                    lista.innerHTML += `<li style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                        ${d.data().nombre} 
                        <button class="btn-delete" style="padding:5px;" onclick="borrarRubro('${d.id}')">✕</button>
                    </li>`;
                });
            } catch (error) {
                console.error("Error de permisos:", error);
                alert("Error de Firebase: Revisa que las Reglas de Seguridad en tu consola de Firebase permitan lectura/escritura.");[cite: 3]
            }
        }

        window.eliminar = async (id) => {
            if(confirm("¿Eliminar solicitud?")) {
                await deleteDoc(doc(db, "solicitudes", id));
                cargarDatos();
            }
        };

        window.crearRubro = async () => {
            const nombre = document.getElementById('nuevo-rubro').value;
            if(nombre) {
                await setDoc(doc(collection(db, "rubros")), { nombre: nombre });
                document.getElementById('nuevo-rubro').value = "";
                cargarDatos();
            }
        };

        // Carga inicial
        cargarDatos();
    </script>
</body>
</html>
