<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: white; min-height: 100vh; padding: 25px; box-sizing: border-box; position: fixed; }
        .sidebar h2 { font-size: 1.3rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 30px; cursor: pointer; font-weight: bold; }

        /* Contenido */
        .main-content { flex: 1; margin-left: 260px; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        /* Gestión de Rubros */
        .flex-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .rubros-list { max-height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .rubro-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #f9f9f9; }
        .btn-del-small { background: #ff7675; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 8px; }

        /* Filtro de Consulta */
        .filter-box { background: #f1f8f4; padding: 20px; border-radius: 10px; border-left: 5px solid var(--secondary); }
        .lista-consulta { margin-top: 15px; padding-left: 20px; color: var(--primary); font-weight: 500; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .btn-alta { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        .btn-eliminar { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem("sesion")) window.location.href = "login.html";
        function cerrarSesion() { localStorage.removeItem("sesion"); window.location.href = "index.html"; }
    </script>

    <div class="sidebar">
        <h2>PANEL ADMIN</h2>
        <p style="font-size: 0.8rem; color: #bdc3c7;">Sesión: <b id="display-user"></b></p>
        <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>

    <div class="main-content">
        <div class="card">
            <h3>🎨 Personalización de la Página</h3>
            <div class="flex-row">
                <input type="text" id="conf-logo" placeholder="URL del Logo" style="flex:1;">
                <input type="text" id="conf-fondo" placeholder="URL Imagen de Fondo" style="flex:1;">
                <button class="btn-alta" id="btn-save-design">ACTUALIZAR</button>
            </div>
        </div>

        <div class="card">
            <h3>🏷️ Gestionar Rubros</h3>
            <div class="flex-row">
                <input type="text" id="new-rubro" placeholder="Nombre del nuevo rubro..." style="flex:1;">
                <button class="btn-alta" id="btn-add-rubro">AÑADIR +</button>
            </div>
            <div class="rubros-list" id="lista-rubros-admin"></div>
        </div>

        <div class="card">
            <h3>📊 Consulta por Rubro</h3>
            <div class="filter-box">
                <select id="filter-select" style="width: 100%;">
                    <option value="">Selecciona un rubro para consultar...</option>
                </select>
                <div id="filter-results" class="lista-consulta"></div>
            </div>
        </div>

        <div class="card">
            <h3>📩 Solicitudes de Admisión</h3>
            <table>
                <thead><tr><th>Comercio</th><th>WhatsApp</th><th>🔑 Usuario</th><th>Acción</th></tr></thead>
                <tbody id="solicitudes-body"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>✅ Comercios Activos</h3>
            <table>
                <thead><tr><th>Nombre</th><th>Rubro</th><th>Usuario</th><th>Acción</th></tr></thead>
                <tbody id="activos-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('display-user').innerText = localStorage.getItem("sesion");

        // --- FUNCIONALIDAD DE RUBROS ---
        document.getElementById('btn-add-rubro').onclick = async () => {
            const nombre = document.getElementById('new-rubro').value.toUpperCase().trim();
            if(nombre) {
                await addDoc(collection(db, "rubros"), { nombre });
                document.getElementById('new-rubro').value = "";
            }
        };

        onSnapshot(collection(db, "rubros"), (snap) => {
            const div = document.getElementById('lista-rubros-admin');
            const select = document.getElementById('filter-select');
            div.innerHTML = "";
            select.innerHTML = '<option value="">Selecciona un rubro para consultar...</option>';
            snap.forEach(d => {
                div.innerHTML += `<div class="rubro-item"><span>${d.data().nombre}</span><button class="btn-del-small" onclick="eliminarDoc('rubros','${d.id}')">✖</button></div>`;
                select.innerHTML += `<option value="${d.data().nombre}">${d.data().nombre}</option>`;
            });
        });

        // --- CONSULTA FILTRADA ---
        document.getElementById('filter-select').onchange = async (e) => {
            const rubro = e.target.value;
            const resDiv = document.getElementById('filter-results');
            if(!rubro) { resDiv.innerHTML = ""; return; }

            const q = query(collection(db, "comercios"), where("rubro", "==", rubro));
            const snap = await getDocs(q);
            resDiv.innerHTML = `<strong>Total en ${rubro}: ${snap.size} comercio(s)</strong><br><br>`;
            snap.forEach(d => {
                resDiv.innerHTML += `• ${d.data().nombre}<br>`;
            });
        };

        // --- RESTO DE GESTIÓN (Personalización, Solicitudes, Activos) ---
        document.getElementById('btn-save-design').onclick = async () => {
            await setDoc(doc(db, "configuracion", "apariencia"), {
                logoUrl: document.getElementById('conf-logo').value,
                fondoUrl: document.getElementById('conf-fondo').value
            });
            alert("Diseño actualizado.");
        };

        onSnapshot(collection(db, "solicitudes"), (snap) => {
            const body = document.getElementById('solicitudes-body');
            body.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                body.innerHTML += `<tr>
                    <td><b>${data.nombre}</b></td><td>${data.whatsapp}</td><td><code>${data.usuario_elegido}</code></td>
                    <td><button class="btn-alta" onclick="aprobar('${d.id}')">DAR ALTA</button></td>
                </tr>`;
            });
        });

        window.aprobar = async (id) => {
            // Lógica para pasar de solicitud a activo (simplificada)
            alert("Procesando alta...");
        };

        window.eliminarDoc = async (col, id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, col, id)); };
    </script>
</body>
</html>
