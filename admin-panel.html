<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--primary); color: white; padding: 20px; }
        .nav-link { padding: 15px; cursor: pointer; display: block; color: #bdc3c7; text-decoration: none; }
        .nav-link:hover, .active { background: var(--secondary); color: white; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; }
    </style>
    <script>
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.cerrarSesion = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</head>
<body>
    <div class="sidebar">
        <h2>ADMIN</h2>
        <div class="nav-link" onclick="showSection('solicitudes')">📩 Solicitudes</div>
        <div class="nav-link" onclick="showSection('rubros')">🏷️ Rubros</div>
        <div class="nav-link" onclick="showSection('config')">🎨 Apariencia</div>
        <button onclick="cerrarSesion()" style="margin-top:20px; background:var(--danger); color:white; border:none; padding:10px; width:100%">Cerrar</button>
    </div>

    <div class="main">
        <div id="solicitudes" class="section active">
            <h2>Solicitudes Pendientes</h2>
            <table>
                <thead><tr><th>Comercio</th><th>WhatsApp</th><th>Acción</th></tr></thead>
                <tbody id="lista-sol"></tbody>
            </table>
        </div>

        <div id="rubros" class="section">
            <h2>Gestión de Rubros</h2>
            <input type="text" id="new-rubro" placeholder="Nombre rubro">
            <button onclick="window.addRubro()" style="background:var(--accent); color:white; padding:10px">Añadir</button>
            <ul id="lista-rubros" style="margin-top:20px"></ul>
        </div>

        <div id="config" class="section">
            <h2>Personalización Visual</h2>
            <label>URL Logo:</label>
            <input type="text" id="cfg-logo" style="width:100%; padding:10px; margin:10px 0">
            <label>URL Fondo de Agua (Inicio):</label>
            <input type="text" id="cfg-fondo" style="width:100%; padding:10px; margin:10px 0">
            <button onclick="window.saveConfig()" style="background:var(--accent); color:white; padding:15px; width:100%">Guardar Diseño</button>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.addRubro = async () => {
            const n = document.getElementById('new-rubro').value;
            if(n) { await setDoc(doc(db, "rubros", n.toLowerCase()), { nombre: n }); location.reload(); }
        };

        window.saveConfig = async () => {
            await setDoc(doc(db, "configuracion", "apariencia"), { 
                logo: document.getElementById('cfg-logo').value,
                fondo_inicio: document.getElementById('cfg-fondo').value 
            });
            alert("¡Diseño Guardado!");
        };

        const cargarTodo = async () => {
            // Cargar Solicitudes
            const solSnap = await getDocs(collection(db, "solicitudes"));
            const tbody = document.getElementById('lista-sol');
            solSnap.forEach(d => {
                const s = d.data();
                tbody.innerHTML += `<tr><td>${s.nombre}</td><td>${s.whatsapp}</td>
                    <td><button onclick="window.aprobar('${d.id}')" class="btn" style="background:var(--accent)">Aprobar</button></td></tr>`;
            });
            // Cargar Config actual
            const cfg = await getDoc(doc(db, "configuracion", "apariencia"));
            if(cfg.exists()){
                document.getElementById('cfg-logo').value = cfg.data().logo || "";
                document.getElementById('cfg-fondo').value = cfg.data().fondo_inicio || "";
            }
        };

        window.aprobar = async (id) => {
            const snap = await getDoc(doc(db, "solicitudes", id));
            await setDoc(doc(db, "comercios", id), snap.data());
            await deleteDoc(doc(db, "solicitudes", id));
            alert("Comercio activado con éxito.");
            location.reload();
        };

        cargarTodo();
    </script>
</body>
</html>
