<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Donde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: rgba(0,0,0,0.2); text-align: center; font-weight: bold; }
        .nav-group { padding: 15px; flex: 1; }
        .nav-link { color: #bdc3c7; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: block; text-decoration: none; }
        .nav-link.active { background: var(--secondary); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; background: #f8f9fa; padding: 15px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--accent); color: white; }
        .btn-logout { background: var(--danger); color: white; margin: 20px; width: calc(100% - 40px); }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:white; padding:30px; border-radius:15px; width:350px; text-align:center; }
        input { width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">DONDE COMPRO - ADMIN</div>
        <div class="nav-group">
            <div class="nav-link active" onclick="navegar('solicitudes')">📩 Solicitudes</div>
            <div class="nav-link" onclick="navegar('comercios')">🏪 Comercios Activos</div>
            <div class="nav-link" onclick="navegar('rubros')">🏷️ Gestionar Rubros</div>
            <div class="nav-link" onclick="navegar('config')">⚙️ Configuración / Logo</div>
        </div>
        <button onclick="salirSesion()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Solicitudes Pendientes</h2>
                <table>
                    <thead><tr><th>Comercio</th><th>WhatsApp</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-sol"></tbody>
                </table>
            </div>
        </div>

        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestión de Rubros</h2>
                <button class="btn btn-add" onclick="document.getElementById('modal-rubro').style.display='flex'">+ Nuevo Rubro</button>
                <table>
                    <thead><tr><th>Rubro</th><th>Acciones</th></tr></thead>
                    <tbody id="lista-rub"></tbody>
                </table>
            </div>
        </div>

        <div id="config" class="section">
            <div class="card">
                <h2>Personalización</h2>
                <label>URL Logo:</label><input type="text" id="cfg-logo">
                <label>URL Fondo (Watermark):</label><input type="text" id="cfg-fondo">
                <button class="btn btn-add" onclick="window.guardarAjustes()">Guardar Todo</button>
            </div>
        </div>
        
        <div id="comercios" class="section">
            <div class="card"><h2>Comercios Activos</h2><p>Lista próximamente...</p></div>
        </div>
    </div>

    <div id="modal-rubro" class="modal">
        <div class="modal-content">
            <h3>Nuevo Rubro</h3>
            <input type="text" id="input-rubro" placeholder="FARMACIA, ALMACEN...">
            <button class="btn btn-add" style="width:100%" onclick="window.nuevoRubro()">GUARDAR</button>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="document.getElementById('modal-rubro').style.display='none'">Cancelar</button>
        </div>
    </div>

    <!-- NAVEGACIÓN INSTANTÁNEA -->
    <script>
        function navegar(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function salirSesion() {
            if(confirm("¿Cerrar sesión?")) {
                localStorage.clear();[cite: 4]
                window.location.href = "login.html";
            }
        }
    </script>

    <!-- FIREBASE INTEGRADO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tus credenciales directas para evitar errores de ruta[cite: 9]
        const firebaseConfig = {
            apiKey: "AIzaSyBYdnEmzLEV6aroL1uNBNrkWdfEGpSDHkw",
            authDomain: "donde-compro-oficial.firebaseapp.com",
            projectId: "donde-compro-oficial",
            storageBucket: "donde-compro-oficial.firebasestorage.app",
            messagingSenderId: "113447539181",
            appId: "1:113447539181:web:6d91fc4fe96bb83d82d7e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNCIONES DE DATOS
        window.nuevoRubro = async () => {
            const nom = document.getElementById('input-rubro').value.trim();
            if(!nom) return;
            await setDoc(doc(db, "rubros", nom.toLowerCase()), { nombre: nom });[cite: 5]
            document.getElementById('modal-rubro').style.display='none';
            cargarRubros();
        };

        window.guardarAjustes = async () => {
            const logo = document.getElementById('cfg-logo').value;
            const fondo = document.getElementById('cfg-fondo').value;
            await setDoc(doc(db, "configuracion", "apariencia"), { logo, fondo_inicio: fondo });[cite: 5]
            alert("Ajustes guardados");
        };

        const cargarSolicitudes = async () => {
            const snap = await getDocs(collection(db, "solicitudes"));
            const lista = document.getElementById('lista-sol');
            lista.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                lista.innerHTML += `<tr><td>${s.nombre}</td><td>${s.whatsapp}</td>
                    <td><button class="btn btn-add" onclick="window.activarCom('${d.id}')">Activar</button></td></tr>`;
            });
        };

        const cargarRubros = async () => {
            const snap = await getDocs(collection(db, "rubros"));
            const lista = document.getElementById('lista-rub');
            lista.innerHTML = "";
            snap.forEach(d => {
                lista.innerHTML += `<tr><td>${d.data().nombre}</td>
                    <td><button class="btn btn-logout" style="padding:5px 10px; margin:0" onclick="window.borrarRub('${d.id}')">Eliminar</button></td></tr>`;
            });
        };

        // Exponer funciones necesarias al objeto window
        window.activarCom = async (id) => {
            const ref = doc(db, "solicitudes", id);
            const data = (await getDoc(ref)).data();
            await setDoc(doc(db, "comercios", id), { ...data, estado: "activo" });[cite: 5]
            await deleteDoc(ref);[cite: 5]
            cargarSolicitudes();
        };

        window.borrarRub = async (id) => {
            if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "rubros", id)); cargarRubros(); }[cite: 5]
        };

        // Inicio
        cargarSolicitudes();
        cargarRubros();
    </script>
</body>
</html>
