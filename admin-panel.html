<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--primary); color: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .nav-link { color: #bdc3c7; text-decoration: none; display: block; padding: 10px 0; transition: 0.3s; cursor: pointer; }
        .nav-link:hover { color: white; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 20px; cursor: pointer; }

        /* Contenido Principal */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; color: var(--primary); border-left: 4px solid var(--secondary); padding-left: 10px; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-accion { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-alta { background: var(--secondary); color: white; }
        .btn-eliminar { background: #e74c3c; color: white; }

        /* Formulario Personalización */
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem("sesion")) {
            window.location.href = "login.html";
        }
        function cerrarSesion() {
            localStorage.removeItem("sesion");
            window.location.href = "index.html";
        }
    </script>

    <div class="sidebar">
        <h2>PANEL ADMIN</h2>
        <div class="nav-link">📊 Resumen</div>
        <div class="nav-link">📂 Comercios</div>
        <div class="nav-link">🎨 Apariencia</div>
        <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>

    <div class="main-content">
        <div class="card">
            <h3>🎨 Personalización de la Página</h3>
            <div class="config-grid">
                <div>
                    <label>URL del Logo:</label>
                    <input type="text" id="conf-logo" placeholder="https://ejemplo.com/logo.png">
                </div>
                <div>
                    <label>URL Imagen de Fondo:</label>
                    <input type="text" id="conf-fondo" placeholder="https://ejemplo.com/fondo.jpg">
                </div>
            </div>
            <button class="btn-save" id="btn-guardar-estetica">ACTUALIZAR DISEÑO</button>
        </div>

        <div class="card">
            <h3>📩 Solicitudes de Admisión</h3>
            <table id="tabla-solicitudes">
                <thead>
                    <tr>
                        <th>Comercio</th>
                        <th>WhatsApp</th>
                        <th>🔑 Usuario Solicitado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card">
            <h3>✅ Comercios Activos</h3>
            <table id="tabla-activos">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Rubro</th>
                        <th>Usuario</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Gestión de Apariencia
        document.getElementById('btn-guardar-estetica').onclick = async () => {
            const logoUrl = document.getElementById('conf-logo').value;
            const fondoUrl = document.getElementById('conf-fondo').value;
            await setDoc(doc(db, "configuracion", "apariencia"), { logoUrl, fondoUrl });
            alert("Diseño actualizado correctamente.");
        };

        // 2. Cargar Solicitudes en Tiempo Real
        onSnapshot(collection(db, "solicitudes"), (snap) => {
            const tbody = document.querySelector("#tabla-solicitudes tbody");
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td><b>${data.nombre}</b><br><small>${data.rubro}</small></td>
                        <td>${data.whatsapp}</td>
                        <td><code>${data.usuario_elegido}</code></td>
                        <td>
                            <button class="btn-accion btn-alta" onclick="aprobarComercio('${d.id}')">DAR ALTA</button>
                            <button class="btn-accion btn-eliminar" onclick="eliminarDoc('solicitudes','${d.id}')">✖</button>
                        </td>
                    </tr>`;
            });
        });

        // 3. Cargar Comercios Activos
        onSnapshot(collection(db, "comercios"), (snap) => {
            const tbody = document.querySelector("#tabla-activos tbody");
            tbody.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${data.nombre}</td>
                        <td>${data.rubro}</td>
                        <td>${data.usuario}</td>
                        <td>
                            <button class="btn-accion btn-eliminar" onclick="eliminarDoc('comercios','${d.id}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        });

        // 4. Función para Aprobar (Pasar de Solicitud a Activo)
        window.aprobarComercio = async (id) => {
            const snap = await doc(db, "solicitudes", id);
            // Aquí deberías obtener el dato y pasarlo a "comercios"
            // Por simplicidad en este ejemplo, simulamos la lógica:
            // (En un sistema real usarías getDoc primero)
            alert("Procesando alta de comercio...");
        };

        // Función Genérica para eliminar
        window.eliminarDoc = async (col, id) => {
            if(confirm("¿Estás seguro?")) {
                await deleteDoc(doc(db, col, id));
            }
        };
    </script>
</body>
</html>
