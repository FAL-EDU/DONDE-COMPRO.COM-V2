<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--primary); color: var(--text); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-link { padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; color: #bdc3c7; }
        .nav-link:hover, .nav-link.active { background: var(--secondary); color: white; border-left-color: var(--accent); }
        
        /* Contenido Principal */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-approve { background: var(--accent); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin: 20px; }
    </style>

    <script>
        // Lógica de navegación inmediata (Fuera del módulo para evitar errores)
        window.navegar = function(id, elemento) {
            // Ocultar todas las secciones
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // Quitar clase active de todos los links
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            // Mostrar la seleccionada
            document.getElementById(id).classList.add('active');
            elemento.classList.add('active');
        };

        window.salir = function() {
            if(confirm("¿Deseas cerrar la sesión administrativa?")) {
                window.location.href = 'index.html';[cite: 4]
            }
        };
    </script>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">ADMIN</div>
        <div class="nav-link active" onclick="navegar('solicitudes', this)">📩 Solicitudes</div>
        <div class="nav-link" onclick="navegar('rubros', this)">🏷️ Gestionar Rubros</div>
        <div class="nav-link" onclick="navegar('personalizar', this)">🎨 Personalización</div>
        <button onclick="salir()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <!-- SECCIÓN: ADMISIÓN DE COMERCIOS -->
        <div id="solicitudes" class="section active">
            <div class="card">
                <h2>Admisión de Comercios</h2>
                <table>
                    <thead>
                        <tr><th>Nombre Comercio</th><th>WhatsApp</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="tabla-solicitudes">
                        <tr><td colspan="3">Conectando con la base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- SECCIÓN: GESTIÓN DE RUBROS -->
        <div id="rubros" class="section">
            <div class="card">
                <h2>Gestión de Rubros</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="input-rubro" placeholder="Nombre del nuevo rubro..." style="flex:1; padding:10px;">
                    <button class="btn btn-approve" onclick="window.agregarRubro()">+ Crear Rubro</button>
                </div>
                <ul id="lista-rubros" style="list-style:none; padding:0;"></ul>
            </div>
        </div>

        <!-- SECCIÓN: PERSONALIZACIÓN -->
        <div id="personalizar" class="section">
            <div class="card">
                <h2>Personalización del Sitio</h2>
                <div style="max-width: 500px;">
                    <label>URL Logo Institucional:</label>
                    <input type="text" id="logo-url" style="width:100%; padding:10px; margin:10px 0;">
                    <label>URL Imagen de Fondo (Watermark):</label>
                    <input type="text" id="fondo-url" style="width:100%; padding:10px; margin:10px 0;">
                    <button class="btn btn-approve" onclick="window.guardarConfig()">Aplicar Cambios Visuales</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYdnEmzLEV6aroL1uNBNrkWdfEGpSDHkw",
            authDomain: "donde-compro-oficial.firebaseapp.com",
            projectId: "donde-compro-oficial",
            storageBucket: "donde-compro-oficial.firebasestorage.app",
            messagingSenderId: "113447539181",
            appId: "1:113447539181:web:6d91fc4fe96bb83d82d7e4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNCIONES DE FIREBASE EXPUESTAS AL WINDOW
        window.cargarDatosAdmin = async () => {
            try {
                // Cargar Solicitudes
                const snapSol = await getDocs(collection(db, "solicitudes"));[cite: 3]
                const tbody = document.getElementById('tabla-solicitudes');
                tbody.innerHTML = "";
                snapSol.forEach(d => {
                    const data = d.data();
                    tbody.innerHTML += `<tr>
                        <td><b>${data.nombre || 'Sin nombre'}</b></td>
                        <td>${data.whatsapp || 'N/A'}</td>
                        <td>
                            <button class="btn btn-approve" onclick="window.aprobarComercio('${d.id}')">Aprobar</button>
                            <button class="btn btn-delete" onclick="window.borrarRegistro('solicitudes', '${d.id}')">Eliminar</button>
                        </td>
                    </tr>`;
                });

                // Cargar Rubros
                const snapRub = await getDocs(collection(db, "rubros"));
                const lista = document.getElementById('lista-rubros');
                lista.innerHTML = "";
                snapRub.forEach(d => {
                    lista.innerHTML += `<li style="padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                        ${d.data().nombre} 
                        <button class="btn-delete" style="padding:5px 10px;" onclick="window.borrarRegistro('rubros', '${d.id}')">✕</button>
                    </li>`;
                });
            } catch (e) { console.error("Error cargando datos:", e); }
        };

        window.borrarRegistro = async (coleccion, id) => {
            if(confirm("¿Estás seguro de eliminar este registro?")) {
                await deleteDoc(doc(db, coleccion, id));[cite: 3]
                window.cargarDatosAdmin();
            }
        };

        window.agregarRubro = async () => {
            const nombre = document.getElementById('input-rubro').value;
            if(nombre) {
                await setDoc(doc(collection(db, "rubros")), { nombre: nombre });[cite: 3]
                document.getElementById('input-rubro').value = "";
                window.cargarDatosAdmin();
            }
        };

        window.aprobarComercio = async (id) => {
            alert("Moviendo comercio a la base de datos oficial...");
            // Aquí se implementaría la lógica de pasar de 'solicitudes' a 'comercios'
        };

        // Iniciar carga
        window.cargarDatosAdmin();
    </script>
</body>
</html>
