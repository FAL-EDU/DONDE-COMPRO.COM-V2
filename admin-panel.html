<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - DÓNDE COMPRO</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #f39c12; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1150px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--secondary); padding-bottom: 10px; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .btn-logout { background: #7f8c8d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; align-items: start; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 25px; }
        h2 { font-size: 1.2rem; color: var(--primary); margin-top: 0; border-left: 5px solid var(--secondary); padding-left: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .btn-approve { background: var(--secondary); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }

        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🛡️ Panel de Administración</h1>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </header>

        <div class="grid">
            <aside>
                <div class="card">
                    <h2>Estética del Sitio</h2>
                    <label>URL Logo:</label>
                    <input type="text" id="logo-url" placeholder="https://...">
                    <label>URL Fondo:</label>
                    <input type="text" id="fondo-url" placeholder="https://...">
                    <button class="btn-save" id="btn-guardar-estetica">Guardar Apariencia</button>
                </div>
            </aside>

            <main>
                <div class="card">
                    <h2>Nuevas Solicitudes</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Comercio</th>
                                <th>WhatsApp</th>
                                <th>Usuario / Pass</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista-solicitudes">
                            </tbody>
                    </table>
                </div>

                <div class="card">
                    <h2>Comercios Activados</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Comercio</th>
                                <th>Dirección</th>
                                <th>Usuario</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-comercios">
                            </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { 
            collection, onSnapshot, doc, addDoc, deleteDoc, setDoc, query, where 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. SEGURIDAD: Solo admin puede estar aquí
        if (localStorage.getItem("sesion") !== "admin") {
            window.location.href = "login.html";
        }

        // 2. LISTAR SOLICITUDES PENDIENTES
        onSnapshot(collection(db, "solicitudes"), (snap) => {
            const tbody = document.getElementById('lista-solicitudes');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${s.nombre}</strong><br><small>${s.rubro}</small></td>
                        <td>${s.whatsapp}</td>
                        <td><small>U: ${s.usuario}<br>P: ${s.pass}</small></td>
                        <td>
                            <button class="btn-approve" onclick="aprobarComercio('${d.id}','${s.nombre}','${s.rubro}','${s.whatsapp}','${s.pass}','${s.direccion}','${s.usuario}')">Aprobar</button>
                        </td>
                    </tr>`;
            });
        });

        // 3. FUNCIÓN PARA APROBAR (Mueve de 'solicitudes' a 'comercios')
        window.aprobarComercio = async (id, n, r, w, p, d, u) => {
            try {
                // Guardamos en la colección definitiva con los campos sincronizados
                await addDoc(collection(db, "comercios"), {
                    nombre: n,
                    rubro: r,
                    whatsapp: w,
                    pass: p,       // Campo clave para el login
                    usuario: u,    // Campo clave para el login
                    direccion: d,
                    rol: "comerciante"
                });
                // Borramos la solicitud pendiente
                await deleteDoc(doc(db, "solicitudes", id));
                alert("¡Comercio activado con éxito!");
            } catch (error) {
                console.error(error);
                alert("Error al aprobar el comercio.");
            }
        };

        // 4. LISTAR COMERCIOS ACTIVOS
        onSnapshot(collection(db, "comercios"), (snap) => {
            const tbody = document.getElementById('lista-comercios');
            tbody.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${c.nombre}</strong></td>
                        <td>${c.direccion}</td>
                        <td><span class="badge">${c.usuario}</span></td>
                        <td>
                            <button class="btn-delete" onclick="eliminarDoc('comercios','${d.id}')">Eliminar</button>
                        </td>
                    </tr>`;
            });
        });

        // 5. ELIMINAR DOCUMENTOS
        window.eliminarDoc = async (col, id) => {
            if (confirm("¿Estás seguro de eliminar este registro?")) {
                await deleteDoc(doc(db, col, id));
            }
        };

        // 6. GUARDAR ESTÉTICA
        document.getElementById('btn-guardar-estetica').onclick = async () => {
            const logo = document.getElementById('logo-url').value;
            const fondo = document.getElementById('fondo-url').value;
            await setDoc(doc(db, "configuracion", "apariencia"), { 
                logoUrl: logo, 
                fondoUrl: fondo 
            });
            alert("Apariencia actualizada en la base de datos.");
        };

        // 7. CERRAR SESIÓN
        window.cerrarSesion = () => {
            localStorage.clear();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
