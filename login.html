<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('btn-login').onclick = async () => {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();

        if (!u || !p) {
            alert("Por favor, completa todos los campos.");
            return;
        }

        // 1. Acceso Administrador
        if (u === "neitor38@gmail.com" && p === "fal-edu12345rdf") {
            localStorage.setItem("sesion", "admin");
            localStorage.setItem("tipo", "admin");
            window.location.href = "admin-panel.html";
            return;
        }

        try {
            // 2. Acceso Comerciantes
            const q = query(collection(db, "comercios"), where("usuario", "==", u));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                alert("El usuario ingresado no existe.");
                return;
            }

            let loginExitoso = false;
            querySnapshot.forEach((doc) => {
                const datos = doc.data();
                // Validamos con el campo 'pass' que guarda el admin-panel
                if (datos.pass === p) {
                    loginExitoso = true;
                    localStorage.setItem("sesion", u);
                    localStorage.setItem("tipo", "comercio");
                    localStorage.setItem("nombreComercio", datos.nombre);
                }
            });

            if (loginExitoso) {
                // REDIRECCIÓN CORREGIDA al nombre de tu archivo
                window.location.href = "panel-comerciante.html"; 
            } else {
                alert("La contraseña es incorrecta.");
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión. Verifica firebase-config.js");
        }
    };
</script>
