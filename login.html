<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - DÓNDE COMPRO</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            width: 350px; 
            text-align: center; 
        }
        .login-card h2 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #27ae60; 
            border: none; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { 
            background: #219150; 
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Panel de Control</h2>
        <p>Ingresa tus credenciales</p>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnEntrar">INGRESAR AL PANEL</button>
        <div id="mensaje-error" class="error-msg">Usuario o contraseña incorrectos</div>
    </div>
    <script type="module">
        // Importamos la configuración desde la misma carpeta raíz
        import { auth } from './firebase-config.js';
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    console.log("Sistema de Login cargado correctamente"); // Esto debe salir en la consola al abrir

    const btnEntrar = document.getElementById('btnEntrar');

    btnEntrar.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        
        console.log("Intentando ingresar con:", email);

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            console.log("Login exitoso:", userCredential.user);
            window.location.href = 'admin-panel.html';
        } catch (error) {
            console.error("Error detallado de Firebase:", error.code, error.message);
            alert("Error: " + error.message);
            }
        };
    </script>
</body>
</html>
