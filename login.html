<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--primary); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 380px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-entrar { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔑 Acceso Privado</h2>
        <div class="input-group">
            <label>USUARIO</label>
            <input type="text" id="user" placeholder="Usuario...">
        </div>
        <div class="input-group">
            <label>CONTRASEÑA</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        <button class="btn-entrar" id="btn-login">ENTRAR AL PANEL</button>
        <br><br>
        <a href="index.html" style="color: #7f8c8d; text-decoration: none; font-size: 0.8rem;">← Volver al Inicio</a>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btn-login').onclick = async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            // 1. Lógica para Administrador
            if (u === "admin" && p === "123admin") {
                localStorage.setItem("sesion", "admin");
                localStorage.setItem("tipo", "admin");
                window.location.href = "admin-panel.html";
                return;
            }

            try {
                // 2. Lógica para Comerciantes
                const q = query(collection(db, "comercios"), where("usuario", "==", u));
                const snap = await getDocs(q);

                if (snap.empty) {
                    alert("Usuario no encontrado");
                    return;
                }

                let encontrado = false;
                snap.forEach(doc => {
                    if (doc.data().pass === p) {
                        encontrado = true;
                        localStorage.setItem("sesion", u); // Sincronizado con panel-comerciante
                        localStorage.setItem("tipo", "comercio");
                    }
                });

                if (encontrado) {
                    window.location.href = "panel-comerciante.html"; 
                } else {
                    alert("Contraseña incorrecta");
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión");
            }
        };
    </script>
</body>
</html>
