<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Dónde Compro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center; }
        .login-card h2 { color: #2c3e50; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-entrar { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        .btn-entrar:hover { background: #219150; }
        .back-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🔑 Acceso Privado</h2>
        <input type="text" id="user" placeholder="Nombre de Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-entrar" id="btn-login">ENTRAR AL PANEL</button>
        <a href="index.html" class="back-link">← Volver al Inicio</a>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btn-login').onclick = async () => {
            const u = document.getElementById('user').value.trim(); // .trim() elimina espacios accidentales
            const p = document.getElementById('pass').value.trim();

            if (!u || !p) {
                alert("Por favor, completa ambos campos.");
                return;
            }

            // 1. Verificación de Administrador
            // Ajusta estos valores a los que desees usar para tu acceso total
            if(u === "admin" && p === "admin123") {
                localStorage.setItem("sesion", "admin");
                window.location.href = "admin-panel.html";
                return;
            }

            try {
                // 2. Verificación de Comerciantes en la colección 'comercios'
                // Importante: El campo en Firebase debe llamarse exactamente 'usuario'
                const q = query(collection(db, "comercios"), where("usuario", "==", u), where("pass", "==", p));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    // Si existe, guardamos la sesión y entramos
                    localStorage.setItem("sesion", u);
                    window.location.href = "admin-panel.html";
                } else {
                    alert("Usuario o contraseña incorrectos. Intenta de nuevo.");
                }
            } catch (error) {
                console.error("Error en login:", error);
                alert("Error de conexión con la base de datos.");
            }
        };
    </script>
</body>
</html>
