<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Usuarios - Dónde Compro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-entrar { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-entrar:hover { background: #219150; }
        .back-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🔑 Acceso Privado</h2>
        <input type="text" id="user" placeholder="Nombre de Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-entrar" onclick="validarAcceso()">ENTRAR AL PANEL</button>
        <a href="index.html" class="back-link">← Volver al Inicio</a>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.validarAcceso = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // 1. Verificación básica de Admin (puedes cambiar esto por algo más complejo luego)
            if(u === "admin" && p === "admin123") {
                localStorage.setItem("sesion", "admin");
                window.location.href = "admin-panel.html";
                return;
            }

            // 2. Verificación de Comerciantes Activos en Firebase
            const q = query(collection(db, "comercios"), where("usuario", "==", u), where("pass", "==", p));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                localStorage.setItem("sesion", u);
                window.location.href = "admin-panel.html"; // O una página específica de comercio
            } else {
                alert("Usuario o contraseña incorrectos. Intenta de nuevo.");
            }
        };
    </script>
</body>
</html>
