<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Sistema - DONDE-COMPRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #2ecc71; transform: translateY(-2px); }
        .footer-links { margin-top: 20px; font-size: 0.8rem; }
        .footer-links a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Bienvenido</h2>
        <p>Ingresa como Administrador o Comercio</p>
        
        <input type="text" id="userInput" placeholder="Correo o Usuario de Comercio">
        <input type="password" id="passInput" placeholder="Contraseña">
        
        <button id="btnIngresar">INGRESAR AL PANEL</button>

        <div class="footer-links">
            <a href="index.html">← Volver a la web principal</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const btnIngresar = document.getElementById('btnIngresar');

        btnIngresar.addEventListener('click', async () => {
            const user = document.getElementById('userInput').value.trim();
            const pass = document.getElementById('passInput').value;

            if (!user || !pass) return alert("Por favor completa los campos");

            // --- CASO 1: ES EL SUPER ADMINISTRADOR (Usa Email) ---
            if (user.includes('@')) {
                try {
                    await signInWithEmailAndPassword(auth, user, pass);
                    window.location.href = 'admin-panel.html';
                } catch (error) {
                    alert("Error de Administrador: " + error.message);
                }
            } 
            // --- CASO 2: ES UN COMERCIANTE (Usa nombre de usuario) ---
            else {
                try {
                    const q = query(collection(db, "comercios"), where("usuario", "==", user), where("password", "==", pass));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        // Guardamos el usuario en el navegador para que el panel sepa quién es
                        localStorage.setItem('usuarioComercio', user);
                        window.location.href = 'panel-comerciante.html';
                    } else {
                        alert("Usuario o contraseña de comercio incorrectos.");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Error al validar comercio.");
                }
            }
        });
    </script>
</body>
</html>
