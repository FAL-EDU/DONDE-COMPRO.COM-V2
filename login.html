<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Dónde Compro</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 Iniciar Sesión</h2>
        <input type="text" id="user" placeholder="Usuario (Email)">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn" id="btn-login">ENTRAR</button>
        <p><a href="index.html" style="color: gray; font-size: 0.8rem; text-decoration: none;">← Volver</a></p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btn-login').onclick = async () => {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();

            if (u === "admin" && p === "123admin") {
                localStorage.setItem("sesion", "admin");
                localStorage.setItem("tipo", "admin");
                window.location.href = "admin-panel.html";
                return;
            }

            try {
                const q = query(collection(db, "comercios"), where("usuario", "==", u));
                const snap = await getDocs(q);

                if (snap.empty) return alert("Usuario no encontrado o no activado.");

                let success = false;
                snap.forEach(d => {
                    if(d.data().pass === p) {
                        success = true;
                        localStorage.setItem("sesion", u);
                        localStorage.setItem("tipo", "comercio");
                    }
                });

                if(success) window.location.href = "panel-comerciante.html";
                else alert("Contraseña incorrecta");
            } catch (e) { alert("Error de conexión"); }
        };
    </script>
</body>
</html>
