<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Dónde Compro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--primary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }
        .login-card h2 { color: var(--primary); margin-bottom: 25px; font-size: 1.5rem; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background: #f9f9f9;
        }
        input:focus { border-color: var(--secondary); outline: none; background: white; }
        .btn-entrar { 
            width: 100%; 
            padding: 16px; 
            background: var(--secondary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-entrar:hover { background: #219150; transform: translateY(-2px); }
        .back-link { display: block; margin-top: 25px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🔑 Acceso Privado</h2>
        
        <div class="input-group">
            <label>USUARIO</label>
            <input type="text" id="user" placeholder="Escribe tu usuario..." autocomplete="off">
        </div>

        <div class="input-group">
            <label>CONTRASEÑA</label>
            <input type="password" id="pass" placeholder="••••••••••••">
        </div>

        <button class="btn-entrar" id="btn-login">ENTRAR AL PANEL</button>
        
        <a href="index.html" class="back-link">← Volver al Inicio Público</a>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btn-login').onclick = async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            if (!u || !p) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            // --- 1. ACCESO PARA ADMINISTRADOR (Manual) ---
            if (u === "neitor38@mail.com" && p === "fal-edu12345rdf") {
                localStorage.setItem("sesion", "admin");
                window.location.href = "admin-panel.html";
                return;
            }

            try {
                // --- 2. ACCESO PARA COMERCIANTES (Búsqueda en Firebase) ---
                // Buscamos en la colección 'comercios' donde el campo 'usuario' coincida
                const q = query(collection(db, "comercios"), where("usuario", "==", u));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    alert("El usuario ingresado no existe.");
                    return;
                }

                let loginExitoso = false;
                querySnapshot.forEach((doc) => {
                    const datos = doc.data();
                    // Verificamos que la contraseña coincida exactamente
                    if (datos.pass === p) {
                        loginExitoso = true;
                        localStorage.setItem("sesion", u); // Guardamos nombre de usuario
                        localStorage.setItem("tipo", "comercio");
                    }
                });

                if (loginExitoso) {
                    window.location.href = "admin-panel.html";
                } else {
                    alert("La contraseña es incorrecta.");
                }

            } catch (error) {
                console.error("Error en el proceso de login:", error);
                alert("Hubo un error al conectar con la base de datos.");
            }
        };
    </script>
</body>
</html>
