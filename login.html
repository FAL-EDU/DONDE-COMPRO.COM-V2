<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.getElementById('btn-login').onclick = async () => {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();

        if (!u || !p) {
            alert("Por favor, completa todos los campos.");
            return;
        }

        // --- 1. ACCESO PARA ADMINISTRADOR ---
        if (u === "admin" && p === "123admin") {
            localStorage.setItem("sesion", "admin");
            localStorage.setItem("tipo", "admin");
            window.location.href = "admin-panel.html"; // Redirige al panel de control total
            return;
        }

        try {
            // --- 2. ACCESO PARA COMERCIANTES ---
            const q = query(collection(db, "comercios"), where("usuario", "==", u));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                alert("El usuario ingresado no existe.");
                return;
            }

            let loginExitoso = false;
            let datosComercio = null;

            querySnapshot.forEach((doc) => {
                const datos = doc.data();
                // Usamos 'pass' para coincidir con lo que guarda el admin-panel
                if (datos.pass === p) {
                    loginExitoso = true;
                    datosComercio = datos;
                }
            });

            if (loginExitoso) {
                // GUARDAR SESIÓN
                localStorage.setItem("sesion", u);
                localStorage.setItem("tipo", "comercio");
                localStorage.setItem("nombreComercio", datosComercio.nombre);

                // --- LA CORRECCIÓN CLAVE ---
                // Si es un comercio, lo enviamos a su propio panel, NO al del admin
                window.location.href = "comerciante.html"; 
            } else {
                alert("La contraseña es incorrecta.");
            }

        } catch (error) {
            console.error("Error en el proceso de login:", error);
            alert("Error de conexión con la base de datos.");
        }
    };
</script>
