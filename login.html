<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Privado</title>
    <style>
        body { background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .login-box { background: white; padding: 40px; border-radius: 10px; color: #333; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align:center">Acceso</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn-login">Entrar</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('btn-login').onclick = async () => {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;

            if(u === "admin" && p === "123admin") {
                localStorage.setItem("sesion", "admin");
                window.location.href = "admin-panel.html";
                return;
            }

            const q = query(collection(db, "comercios"), where("usuario", "==", u), where("pass", "==", p));
            const snap = await getDocs(q);

            if(!snap.empty) {
                const docRef = snap.docs[0];
                localStorage.setItem("comercioId", docRef.id);
                localStorage.setItem("comercioNombre", docRef.data().nombre);
                window.location.href = "panel-comerciante.html";
            } else {
                alert("Credenciales incorrectas o cuenta no activa.");
            }
        };
    </script>
</body>
</html>
