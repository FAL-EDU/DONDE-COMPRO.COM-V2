<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Carrito - DÓNDE COMPRO.COM</title>
    <style>
        body { font-family: 'Roboto', sans-serif; padding: 20px; background: #f4f7f6; }
        .carrito-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .total { font-size: 20px; font-weight: bold; text-align: right; margin-top: 20px; }
        .metodo-entrega { margin: 20px 0; padding: 15px; background: #e8f4fd; border-radius: 5px; }
        .btn-confirmar { width: 100%; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="carrito-container">
        <h2>Resumen de tu Pedido</h2>
        <div class="item-carrito">
            <span>Producto Ejemplo x 2</span>
            <span>$2.400,00</span>
        </div>
        <div class="total">Total: $2.400,00</div>
        
        <div class="metodo-entrega">
            <label><input type="radio" name="entrega" checked> Retiro en tienda</label><br>
            <label><input type="radio" name="entrega"> Envío a domicilio</label>
        </div>

        <button class="btn-confirmar">CONFIRMAR RESERVA</button>
        <p style="text-align:center; font-size:12px; color:gray;">Se generará un número de pedido automáticamente.</p>
    </div>
</body>
</html>
